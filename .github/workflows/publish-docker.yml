name: Publish Docker Images

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "Tag to publish (defaults to latest tag)"
        required: false
        type: string
      release_channel:
        description: "Floating channel tag to apply"
        required: true
        type: choice
        default: alpha
        options:
          - alpha
          - beta
          - latest

  workflow_call:
    secrets:
      DOCKER_HUB_TOKEN:
        required: true
      DOCKER_HUB_USERNAME:
        required: true

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      packages: write
      contents: read
      id-token: write
      attestations: write

    env:
      IMAGE_NAME: sigenergy2mqtt

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build release distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || true)
          fi

          if [ -z "$VERSION" ]; then
            echo "ERROR: Unable to determine version (no git tags found)" >&2
            exit 1
          fi

          echo "Resolved version: $VERSION"
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            # Release events: version tag from git ref
            type=ref,event=tag

            # Release events: explicit tag fallback (hardening)
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

            # Release events: floating tags
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=beta,enable=${{ github.event_name == 'release' && github.event.release.prerelease }}

            # Manual dispatch: version + channel
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ inputs.release_channel || '' }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: docker_build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance (GHCR)
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

      # Docker Hub attestation can be flaky; keep but don't fail build if it errors
      - name: Attest build provenance (Docker Hub)
        continue-on-error: true
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

      - name: Print image digest
        run: |
          echo "Pushed digest: ${{ steps.docker_build.outputs.digest }}"

      - name: Summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: ${{ steps.docker_build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY