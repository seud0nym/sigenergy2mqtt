name: Publish Python Package to PyPI

on:
  release:
    # `published` fires for both stable releases and prereleases once they are published.
    # Keeping this to `published` avoids duplicate runs that can happen when combining
    # `published` and `prereleased` for the same prerelease publication.
    types: [published]
  workflow_dispatch:

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build

    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/sigenergy2mqtt/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
