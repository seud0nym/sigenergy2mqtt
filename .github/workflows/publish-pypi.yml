name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to publish (defaults to latest tag)"
        required: false
        type: string

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine ref
        id: ref
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${INPUT_REF:-$(git describe --tags --abbrev=0 2>/dev/null || echo "")}"
            if [ -z "$TAG" ]; then
              echo "No tags found and no ref provided"
              exit 1
            fi
            echo "ref=$TAG" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target ref
        run: |
          git fetch --tags --force
          git checkout --force "${{ steps.ref.outputs.ref }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Fix README links for PyPI
        run: |
          REF="${{ steps.ref.outputs.ref }}"
          REPO="https://github.com/${{ github.repository }}/blob/${REF}"
          REPO_RAW="https://github.com/${{ github.repository }}/raw/${REF}"

          # Rewrite ./ and ../ links
          sed -i -E 's|\]\(\./|]('"${REPO}"'/|g' README.md
          sed -i -E 's|\]\(\.\./|]('"${REPO}"'/|g' README.md

          # Rewrite resource paths safely (badges/ must come before resources/)
          sed -i -E 's|\]\((resources/badges/)|]('"${REPO_RAW}"'/\1|g' README.md
          sed -i -E 's|\]\((resources/)|]('"${REPO}"'/\1|g' README.md

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Build release distributions
        run: python -m build

      - name: Verify distributions exist
        run: |
          ls -lah dist/
          test -n "$(ls -A dist/)"

      - name: Check distributions
        run: twine check dist/*

      - name: Verify version matches tag
        run: |
          TAG="${{ steps.ref.outputs.ref }}"
          TAG="${TAG#v}"

          VERSION=$(python .github/scripts/publish-pypi-get-version.py)

          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: package=$VERSION tag=$TAG"
            exit 1
          fi
          echo "Version verified: $VERSION"
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/sigenergy2mqtt/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Verify distributions exist
        run: |
          ls -lah dist/
          test -n "$(ls -A dist/)"

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # skip-existing intentionally omitted (fail loudly on partial uploads)