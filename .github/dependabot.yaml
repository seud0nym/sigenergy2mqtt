version: 2
updates:
  # Monitor GitHub Actions with global grouping
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Australia/Melbourne"
    groups:
      # Dependabot evaluates this first
      artifact-actions:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"
      # Dependabot evaluates this second. Anything caught above is already ignored here.
      all-other-actions:
        patterns:
          - "*"

  # Monitor Python dependencies (Hatch/pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Australia/Melbourne"
    groups:
      python-packages:
        patterns:
          - "*"

  # Monitor Docker base image (sigenergy2mqtt)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Australia/Melbourne"