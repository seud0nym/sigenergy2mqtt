version: 2
updates:
  # Monitor GitHub Actions with global grouping
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Australia/Melbourne"
    groups:
      # This group forces these two to always be updated together
      artifact-actions:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"
      # Everything else stays in the general group
      all-other-actions:
        patterns:
          - "*"
        exclude:
          - "actions/upload-artifact"
          - "actions/download-artifact"

  # Monitor Python dependencies (Hatch/pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Australia/Melbourne"
    groups:
      python-packages:
        patterns:
          - "*"

  # Monitor Docker base image (sigenergy2mqtt)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Australia/Melbourne"

  # Monitor Docker base image (modbus-test-server)
  - package-ecosystem: "docker"
    directory: "/tests/utils"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Australia/Melbourne"
