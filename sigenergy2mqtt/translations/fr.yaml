  SIGENERGY2MQTT_PVOUTPUT_IMPORTS:
    help: Activer l'envoi des données d'importation à PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_LOG_LEVEL:
    help: 'Définir le niveau de journalisation PVOutput. Valeurs valides: DEBUG, INFO, WARNING, ERROR ou CRITICAL. Par défaut: WARNING (avertissements, erreurs et défaillances critiques)'
  SIGENERGY2MQTT_PVOUTPUT_OUTPUT_HOUR:
    help: "L'heure du jour (20-23) à laquelle les totaux journaliers sont envoyés à PVOutput. Par défaut 23 (23h). Valeurs valides: 20 à 23. La minute est choisie aléatoirement entre 56 et 59. Si vous spécifiez -1, les téléchargements quotidiens seront envoyés à la même fréquence que les mises à jour de statut."
  SIGENERGY2MQTT_PVOUTPUT_SYSTEM_ID:
    help: L'ID Système PVOutput
  SIGENERGY2MQTT_PVOUTPUT_TEMP_TOPIC:
    help: "Une source pour la température actuelle envoyée à PVOutput. Vous pouvez spécifier un topic MQTT direct (ou mqtt:<topic>) ou un id d’entité de capteur Home Assistant (sensor.<id> ou ha:sensor.<id>, app uniquement). Si non spécifié, la température ne sera pas envoyée à PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_UPLOAD_LOG_LEVEL:
    help: 'Définissez le niveau de journalisation pour les messages du journal de téléchargement PVOutput. Les valeurs valides sont : DEBUG, INFO, AVERTISSEMENT, ERREUR ou CRITICAL. La valeur par défaut est INFO'
  SIGENERGY2MQTT_PVOUTPUT_VOLTAGE:
    help: "La source de la valeur de tension à envoyer à PVOutput. Valeurs valides: phase-a, phase-b, phase-c, l/n-avg (moyenne ligne-neutre), l/l-avg (moyenne ligne-ligne) ou pv (moyenne sur les chaînes PV). Par défaut: 'l/n-avg'."
  SIGENERGY2MQTT_REPEATED_STATE_PUBLISH_INTERVAL:
    help: "L'intervalle en secondes auquel les états répétés sont publiés. Si < 0, les états répétés ne sont jamais publiés. Si 0, les états répétés sont toujours publiés. Si > 0, les états répétés sont publiés à l'intervalle spécifié. La valeur par défaut est 0 (toujours publier)."
  SIGENERGY2MQTT_SANITY_CHECK_DEFAULT_KW:
    help: La valeur par défaut en kW utilisée pour les vérifications de cohérence pour valider les valeurs maximales et minimales des capteurs de puissance et la valeur delta des capteurs d'énergie. La valeur par défaut est 500 kW par seconde, les lectures hors plage sont ignorées.
  SIGENERGY2MQTT_SCAN_INTERVAL_HIGH:
    help: L'intervalle de scan en secondes pour les registres Modbus à scanner à haute fréquence. Par défaut 10 (secondes), valeur minimale 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_LOW:
    help: L'intervalle de scan en secondes pour les registres Modbus à scanner à basse fréquence. Par défaut 600 (secondes), valeur minimale 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_MEDIUM:
    help: L'intervalle de scan en secondes pour les registres Modbus à scanner à fréquence moyenne. Par défaut 60 (secondes), valeur minimale 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_REALTIME:
    help: L'intervalle de scan en secondes pour les registres Modbus à scanner en temps quasi réel. Par défaut 5 (secondes), valeur minimale 1.
  clean:
    help: Publier une découverte vide pour supprimer les dispositifs existants, puis quitter immédiatement.
  discovery_only:
    help: Quitter immédiatement après la publication de la découverte. Ne lit pas les valeurs de l'interface Modbus, sauf pour sonder la configuration du dispositif.
  show_version:
    help: Affiche le numéro de version, puis quitte immédiatement.
  validate_only:
    help: 'Valide la configuration et teste les paramètres de connexion/authentification configurés, puis quitte immédiatement. Mode optionnel : --validate=show_credentials journalise les identifiants réels utilisés pour les tests de connexion.'
