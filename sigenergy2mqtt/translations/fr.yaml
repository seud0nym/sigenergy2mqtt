      comment: 'Lors de la vente d''électricité au point de raccordement au réseau, le facteur de puissance doit être contrôlé à la valeur configurée dans ce capteur. Plage : [(-1,0, -0,8) U (0,8, 1,0)]. Capteur de grille nécessaire.'
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Valeur cible d'ajustement du facteur de puissance PCC (exportation de réseau)
  PCCPowerFactorAdjustmentTargetValueGridImport:
    attributes:
      comment: 'Lors de l''achat d''électricité au point de raccordement au réseau, le facteur de puissance doit être contrôlé à la valeur configurée dans ce capteur. Plage : [(-1,0, -0,8) U (0,8, 1,0)]. Capteur de grille nécessaire.'
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Valeur cible d'ajustement du facteur de puissance PCC (importation de réseau)
  PCSMaxExportLimit:
    attributes:
      comment: "La puissance active maximale de l'onduleur dans l'installation ne doit pas dépasser la valeur configurée dans ce capteur. Plage : [0, 0xFFFFFFFE]。Avec la valeur 0xFFFFFFFF, le registre n'est pas valide. Dans tous les autres cas, prend effet globalement."
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Limite d'Export Max PCS
  PCSMaxImportLimit:
    attributes:
      comment: "La puissance active maximale absorbée par l'onduleur dans l'installation ne doit pas dépasser la valeur configurée dans ce capteur. Plage : [0, 0xFFFFFFFE]。Avec la valeur 0xFFFFFFFF, le registre n'est pas valide. Dans tous les autres cas, prend effet globalement."
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Limite d'Import Max PCS
