class:
  ACCharger:
    name: Chargeur CA Sigenergy {sequence_suffix}
  ACChargerAlarm1:
    alarm:
      '0': Surtension réseau
      '1': Sous-tension réseau
      '2': Surcharge
      '3': Court-circuit
      '4': Surintensité sortie de charge
      '5': Courant de fuite hors limite
      '6': Défaut de mise à la terre
      '7': Séquence de phase du câblage réseau anormale
      '8': Défaut PEN
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Alarme 1
  ACChargerAlarm2:
    alarm:
      '0': Défaut du circuit de détection de courant de fuite
      '1': Relais bloqué
      '2': Défaut du circuit pilote
      '3': Défaut du module d'alimentation auxiliaire
      '4': Défaut de verrouillage électrique
      '5': Défaut de communication du panneau lumineux
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Alarme 2
  ACChargerAlarm3:
    alarm:
      '0': Température interne trop élevée
      '1': Défaut du câble de charge
      '2': Défaut de communication du compteur
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Alarme 3
  ACChargerAlarms:
    attributes:
      source: Registres Modbus 32012-32014
      source_range: Registres Modbus {start}-{end}
    name: Alarmes
  ACChargerChargingPower:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Puissance de Charge
  ACChargerInputBreaker:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Disjoncteur d'Entrée
  ACChargerOutputCurrent:
    attributes:
      comment: "Plage : [6, le plus petit entre 'Courant Nominal du Chargeur CA' et 'Courant Nominal du Disjoncteur d'Entrée du Chargeur CA']"
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Courant de Sortie
  ACChargerRatedCurrent:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Courant Nominal
  ACChargerRatedPower:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Puissance Nominale
  ACChargerRatedVoltage:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Tension Nominale
  ACChargerRunningState:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: État de Fonctionnement
    options:
      "0": Initialisation
      "1": VE non connecté
      "2": Chargeur et VE non prêts
      "3": Chargeur prêt ; VE non prêt
      "4": Chargeur non prêt ; VE prêt
      "5": Charge en cours
      "6": Défaut
      "7": Erreur
  ACChargerStatus:
    attributes:
      comment: 0:Démarrer 1:Arrêter
    name: Démarrer/Arrêter Chargeur CA
    name_off: Arrêter
    name_on: Démarrer
  ACChargerTotalEnergyConsumed:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Énergie Totale Consommée
  AccumulatedChargeEnergy:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Énergie de Charge Totale
  AccumulatedDischargeEnergy:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Énergie de Décharge Totale
  ActivePower:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Puissance Active
  ActivePowerFixedAdjustmentTargetValue:
    attributes:
      comment: L'EMS distant doit être activé et l'EMS doit être en mode de contrôle à distance PCS pour que ce registre prenne effet.
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Valeur Cible d'Ajustement Fixe de Puissance Active
  ActivePowerPercentageAdjustmentTargetValue:
    attributes:
      comment: "Plage : [-100,00,100,00]. L'EMS distant doit être activé et l'EMS doit être en mode de contrôle à distance PCS pour que ce registre prenne effet."
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Valeur Cible d'Ajustement en Pourcentage de Puissance Active
  ActivePowerRegulationGradient:
    attributes:
      comment: "Plage : [0, 5000]. Pourcentage de puissance nominale ajusté par seconde"
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Gradient de Régulation de Puissance Active
  Alarm1Sensor:
    alarm:
      '0': Incompatibilité de version logicielle
      '1': Faible résistance d'isolement
      '2': Surtempérature
      '3': Défaut d'équipement
      '4': Défaut de mise à la terre du système
      '5': Surtension string PV
      '6': String PV connecté inversement
      '7': Courant de retour string PV
      '8': Défaut AFCI
      '9': Coupure de courant réseau
      '10': Surtension réseau
      '11': Sous-tension réseau
      '12': Surfréquence réseau
      '13': Sous-fréquence réseau
      '14': Déséquilibre de tension réseau
      '15': Composante DC du courant de sortie hors limite
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: PC
  Alarm2Sensor:
    alarm:
      '0': Courant de fuite hors limite
      '1': Communication anormale
      '2': Protection interne du système
      '3': Défaut du circuit d'auto-vérification AFCI
      '4': Protection hors réseau
      '5': Protection opération manuelle
      '7': Séquence de phase anormale
      '8': Court-circuit vers PE
      '9': Échec du démarrage progressif
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: PC
  Alarm3Sensor:
    alarm:
      '0': Incompatibilité de version logicielle
      '1': Faible résistance d'isolement à la terre
      '2': Température trop élevée
      '3': Défaut d'équipement
      '4': Sous-température
      '5': Protection interne
      '6': Emballement thermique
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: ESS  # verify:ignore
  Alarm4Sensor:
    alarm:
      '0': Incompatibilité de version logicielle
      '1': Température trop élevée
      '2': Défaut d'équipement
      '3': Courant de fuite excessif en sortie hors réseau
      '4': Défaut de mise à la terre ligne N
      '5': Séquence de phase du câblage réseau anormale
      '6': Séquence de phase du câblage onduleur anormale
      '7': Perte de phase réseau
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: GW  # verify:ignore
  Alarm5Sensor:
    alarm:
      '0': Incompatibilité de version logicielle
      '1': Faible résistance d'isolement à la terre
      '2': Surtempérature
      '3': Défaut d'équipement
      '4': Défaut de charge
      '5': Protection d'équipement
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: EVDC  # verify:ignore
  Alarm6:
    alarm:
      '0': Communication de la passerelle anormale
      '1': Communication du compteur anormale
      '2': Communication du capteur de puissance AC anormale
      '6': Protection matérielle contre dépassement de limite d'injection réseau
      '8': Échec de démarrage du générateur
      '10': Défaut CLS
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Alarme 6
  Alarm7:
    alarm:
      '0': Défaut OVGR
      '1': Défaut RPR
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Alarme 7
  AlarmCombinedSensor:
    attributes:
      source: Registre Modbus {address}
      source_range: Registres Modbus {start}-{end}
    name: Onduleur hybride
  AlarmSensor:
    attributes:
