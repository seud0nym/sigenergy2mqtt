class:
  ACCharger:
    name: Sigenergy AC充電器 {sequence_suffix}
  ACChargerAlarm1:
    alarm:
      '0': 系統過電圧
      '1': 系統低電圧
      '2': 過負荷
      '3': 短絡
      '4': 充電出力過電流
      '5': 漏電電流制限超過
      '6': 接地故障
      '7': 系統配線の位相順序異常
      '8': PEN故障
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: アラーム1
  ACChargerAlarm2:
    alarm:
      '0': 漏電検出回路故障
      '1': リレー固着
      '2': パイロット回路故障
      '3': 補助電源モジュール故障
      '4': 電気錠故障
      '5': ランプパネル通信故障
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: アラーム2
  ACChargerAlarm3:
    alarm:
      '0': 内部温度過高
      '1': 充電ケーブル故障
      '2': メーター通信故障
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: アラーム3
  ACChargerAlarms:
    attributes:
      source: Modbusレジスタ 32012-32014
      source_range: Modbusレジスタ {start}-{end}
    name: アラーム
  ACChargerChargingPower:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 充電電力
  ACChargerInputBreaker:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 入力ブレーカー
  ACChargerOutputCurrent:
    attributes:
      comment: "範囲：[6, 'AC充電器定格電流'と'AC充電器入力ブレーカー定格電流'の小さい方]"
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 出力電流
  ACChargerRatedCurrent:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 定格電流
  ACChargerRatedPower:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 定格電力
  ACChargerRatedVoltage:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 定格電圧
  ACChargerRunningState:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 運転状態
    options:
      "0": 初期化中
      "1": EV未接続
      "2": 充電器とEV準備未完了
      "3": 充電器準備完了；EV準備未完了
      "4": 充電器準備未完了；EV準備完了
      "5": 充電中
      "6": 故障
      "7": エラー
  ACChargerStatus:
    attributes:
      comment: 0:開始 1:停止
    name: AC充電器 開始/停止
    name_off: 停止
    name_on: 開始
  ACChargerTotalEnergyConsumed:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 合計消費電力量
  AccumulatedChargeEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 累計充電電力量
  AccumulatedDischargeEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 累計放電電力量
  ActivePower:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 有効電力
  ActivePowerFixedAdjustmentTargetValue:
    attributes:
      comment: このレジスタを有効にするには、リモート EMS が有効になっており、EMS が PCS リモート制御モードになっている必要があります。
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 有効電力固定調整目標値
  ActivePowerPercentageAdjustmentTargetValue:
    attributes:
      comment: "範囲: [-100.00,100.00]。このレジスタを有効にするには、リモート EMS が有効になっており、EMS が PCS リモート制御モードになっている必要があります。"
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 有効電力パーセンテージ調整目標値
  ActivePowerRegulationGradient:
    attributes:
      comment: "範囲：[0, 5000]。毎秒調整される定格電力の割合"
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 有効電力調整勾配
  Alarm1Sensor:
    alarm:
      '0': ソフトウェアバージョン不一致
      '1': 絶縁抵抗低下
      '2': 過温度
      '3': 機器故障
      '4': システム接地故障
      '5': PVストリング過電圧
      '6': PVストリング逆接続
      '7': PVストリング逆流
      '8': AFCI故障
      '9': 系統停電
      '10': 系統過電圧
      '11': 系統低電圧
      '12': 系統過周波数
      '13': 系統低周波数
      '14': 系統電圧不均衡
      '15': 出力電流のDC成分制限超過
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: PCS  # verify:ignore
  Alarm2Sensor:
    alarm:
      '0': 漏電電流制限超過
      '1': 通信異常
      '2': システム内部保護
      '3': AFCI自己診断回路故障
      '4': 系統分離保護
      '5': 手動操作保護
      '7': 位相順序異常
      '8': PEへの短絡
      '9': ソフトスタート失敗
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: PCS  # verify:ignore
  Alarm3Sensor:
    alarm:
      '0': ソフトウェアバージョン不一致
      '1': 対地絶縁抵抗低下
      '2': 温度過高
      '3': 機器故障
      '4': 温度過低
      '5': 内部保護
      '6': 熱暴走
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: ESS  # verify:ignore
  Alarm4Sensor:
    alarm:
      '0': ソフトウェアバージョン不一致
      '1': 温度過高
      '2': 機器故障
      '3': 系統分離出力での過大漏電電流
      '4': N線接地故障
      '5': 系統配線の位相順序異常
      '6': インバーター配線の位相順序異常
      '7': 系統相欠け
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: GW  # verify:ignore
  Alarm5Sensor:
    alarm:
      '0': ソフトウェアバージョン不一致
      '1': 対地絶縁抵抗低下
      '2': 過温度
      '3': 機器故障
      '4': 充電故障
      '5': 機器保護
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: EVDC  # verify:ignore
  Alarm6:
    alarm:
      '0': ゲートウェイ通信異常
      '1': メーター通信異常
      '2': AC電力センサー通信異常
      '6': 系統給電制限超過ハード保護
      '8': 発電機起動失敗
      '10': CLS故障
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: アラーム6
  Alarm7:
    alarm:
      '0': OVGR故障
      '1': RPR故障
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: アラーム7
  AlarmCombinedSensor:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: ハイブリッドインバーター
  AlarmSensor:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    no_alarm: アラームなし
    unknown_alarm: 不明 (bit{bit}∈{value})
  AvailableBatteryChargeEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能充電電力量
  AvailableBatteryDischargeEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能放電電力量
  AvailableMaxActivePower:
    attributes:
      comment: AC端子への供給。稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最大有効電力
  AvailableMaxChargingCapacity:
    attributes:
      comment: 稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最大充電容量
  AvailableMaxChargingPower:
    attributes:
      comment: 稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最大充電電力
  AvailableMaxDischargingCapacity:
    attributes:
      comment: 稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最大放電容量
  AvailableMaxDischargingPower:
    attributes:
      comment: AC端子からの吸収。稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最大放電電力
  AvailableMaxReactivePower:
    attributes:
      comment: AC端子への供給。稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最大無効電力
  AvailableMinActivePower:
    attributes:
      comment: AC端子からの吸収。稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最小有効電力
  AvailableMinReactivePower:
    attributes:
      comment: AC端子からの吸収。稼働中のインバーターのみをカウント
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 利用可能最小無効電力
  AverageCellTemperature:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 平均セル温度
  AverageCellVoltage:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 平均セル電圧
  BatteryChargingPower:
    attributes:
      source: BatteryPower > 0 #verify:ignore
    name: バッテリー充電電力
  BatteryDischargingPower:
    attributes:
      source: BatteryPower < 0 × -1 #verify:ignore
    name: バッテリー放電電力
  BatteryPower:
    attributes:
      comment: "ESS電力：<0 = 放電、>0 = 充電"
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: バッテリー電力
  ChargeCutOffSoC:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 充電カットオフ率
  ChargeDischargePower:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: バッテリー電力
  CurrentControlCommandValue:
    attributes:
      comment: 日本でのリモート出力制御の使用
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 現在の制御コマンド値
  DCCharger:
    name: Sigenergy DC充電器 {sequence_suffix}
  DCChargerCurrentChargingCapacity:
    attributes:
      comment: 単回
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 現在の充電容量
  DCChargerCurrentChargingDuration:
    attributes:
      comment: 単回
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 現在の充電時間
  DCChargerCurrentDischargingCapacity:
    attributes:
      comment: 1回限り
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 電流放電容量
  DCChargerCurrentDischargingDuration:
    attributes:
      comment: 1回限り
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 電流の放電期間
  DCChargerDischargingCurrent:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 放電電流
  DCChargerMaxChargingPowerLimit:
    attributes:
      comment: DC充電器の最大充電電力制限
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 最大充電電力制限
  DCChargerMaxDischargingPowerLimit:
    attributes:
      comment: DC充電器の最大放電電力制限
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 最大放電電力制限
  DCChargerOutputPower:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 出力電力
  DCChargerRatedChargingPower:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 定格充電電力
  DCChargerRatedDischargingPower:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 定格放電電力
  DCChargerRunningState:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 運転状態
    options:
      "0": アイドル
      "1": 使用中（充電ガンが接続されているが検出されない）
      "2": 準備中（通信確立中）
      "3": 充電中
      "4": 故障
      "5": 予約済み
  DCChargerStatus:
    attributes:
      comment: 0:開始 1:停止
    name: DC充電器 開始/停止
    name_off: 停止
    name_on: 開始
  DCChargerTotalChargingCapacity:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 総充電容量
  DCChargerTotalDischargingCapacity:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 総放電容量
  DCChargerVehicleBatteryVoltage:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 車両バッテリー電圧
  DCChargerVehicleChargingCurrent:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 車両充電電流
  DCChargerVehicleSoC:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 車両充電率
  DailyChargeEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 日次充電電力量
  DailyDischargeEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 日次放電電力量
  DischargeCutOffSoC:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 放電カットオフ率
  DistributionCabinet:
    name: '{model_id} {serial} 配電キャビネット'
  EMSWorkMode:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: EMS動作モード
    options:
      "0": 最大自家消費
      "1": Sigen AI
      "2": 時間帯別料金
      "5": 全量系統連系
      "6": VPPスケジューリング
      "7": リモートEMS
      "9": 時間ベース制御
  ESS:
    name: '{model_id} {serial_number} 蓄電システム'
  ESSAverageCellTemperature:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 平均セル温度
  ESSBackupSOC:
    attributes:
      comment: "範囲：[0.00, 100.00]"
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: バックアップ充電率
  ESSChargeCutOffSOC:
    attributes:
      comment: "範囲：[0.00, 100.00]"
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 充電カットオフ率
  ESSDischargeCutOffSOC:
    attributes:
      comment: "範囲：[0.00, 100.00]"
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 放電カットオフ率
  ESSPreHeating:
    name: Sigenergy Plant ESS 予熱 {plant_suffix}
  ESSPreHeatingAdvanceEnable:
    attributes:
      comment: '0: 無効、1: 有効。予熱モードが手動の場合に有効になります。'
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 予熱アドバンス
  ESSPreHeatingEnable:
    attributes:
      comment: '0：無効、1：有効'
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 予熱
  ESSPreHeatingMode:
    attributes:
      comment: '0：自動、1：手動'
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 予熱モード
    options:
      '0': 自動
      '1': マニュアル
  ESSPreHeatingReservedSOC:
    attributes:
      comment: '範囲: [0.00,100.00]'
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 予約済み SoC の予熱
  ESSPreHeatingTOUTargetPower:
    attributes:
      comment: '<0: 放電中、>0: 充電中'
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: TOU {slot} 目標充放電電力
  ESSPreHeatingTOUTime:
    attributes:
      comment: タイムゾーン付きのエポック秒。現地時間の解釈はデバイスによって異なります。
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: ハイブリッドインバーター
  ESSPreHeatingTOUTimeEnd:
    attributes:
      comment: タイムゾーン付きのエポック秒。現地時間の解釈はデバイスによって異なります。
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: TOU {slot} 終了
  ESSPreHeatingTOUTimeStart:
    attributes:
      comment: タイムゾーン付きのエポック秒。現地時間の解釈はデバイスによって異なります。
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: TOU {slot} スタート
  ESSTotalChargedEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 累計充電電力量
  ESSTotalDischargedEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: 累計放電電力量
  EVDCTotalChargedEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: DC EV累計充電電力量
  EVDCTotalDischargedEnergy:
    attributes:
      source: Modbusレジスタ {address}
      source_range: Modbusレジスタ {start}-{end}
    name: DC EV累計放電電力量
  GeneralAlarm1:
    alarm:
      '0': ソフトウェアバージョン不一致
      '1': 絶縁抵抗低下
      '2': 過温度
      '3': 機器故障
      '4': システム接地故障
      '5': PVストリング過電圧
      '6': PVストリング逆接続
      '7': PVストリング逆流
      '8': AFCI故障
      '9': 系統停電
      '10': 系統過電圧
      '11': 系統低電圧
