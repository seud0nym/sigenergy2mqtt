  SIGENERGY2MQTT_SCAN_INTERVAL_MEDIUM:
    help: 'Scaninterval in seconden voor registers met gemiddelde frequentie. Standaard: 60.'
  SIGENERGY2MQTT_SCAN_INTERVAL_REALTIME:
    help: 'Scaninterval in seconden voor real-time registers. Standaard: 5.'
