      source_range: Modbus-registers {start}-{end}
    name: Totaal Verbruikte Energie
  AccumulatedChargeEnergy:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Totale Laadenergie
  AccumulatedDischargeEnergy:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Totale Ontlaadenergie
  ActivePower:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Actief Vermogen
  ActivePowerFixedAdjustmentTargetValue:
    attributes:
      comment: Om dit register in werking te laten treden, moet het externe EMS zijn ingeschakeld en moet het EMS in de PCS-afstandsbedieningsmodus staan.
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Actief Vermogen Vast Instelwaarde
  ActivePowerPercentageAdjustmentTargetValue:
    attributes:
      comment: "Bereik: [-100,00,100,00]. Om dit register in werking te laten treden, moet het externe EMS zijn ingeschakeld en moet het EMS in de PCS-afstandsbedieningsmodus staan."
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Actief Vermogen Percentage Instelwaarde
  ActivePowerRegulationGradient:
    attributes:
      comment: "Bereik: [0, 5000]. Percentage van nominaal vermogen aangepast per seconde"
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Actief Vermogen Regelgradiënt
  Alarm1Sensor:
    alarm:
      '0': Softwareversie komt niet overeen
      '1': Lage isolatieweerstand
      '2': Overtemperatuur
      '3': Apparatuurfout
      '4': Systeem aardingsfout
      '5': PV-string overspanning
      '6': PV-string omgekeerd aangesloten
      '7': PV-string terugvoeding
      '8': AFCI-fout
      '9': Netstroomuitval
      '10': Net overspanning
      '11': Net onderspanning
      '12': Net overfrequentie
      '13': Net onderfrequentie
      '14': Netspanning onbalans
      '15': DC-component van uitgangsstroom buiten limiet
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: STUKS
  Alarm2Sensor:
    alarm:
      '0': Lekstroom buiten limiet
      '1': Communicatie abnormaal
      '2': Systeem interne beveiliging
      '3': AFCI zelftest circuitfout
      '4': Off-grid beveiliging
      '5': Handmatige operatiebeveiliging
      '7': Abnormale fasevolgorde
      '8': Kortsluiting naar PE
      '9': Zachte start mislukt
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: STUKS
  Alarm3Sensor:
    alarm:
      '0': Softwareversie komt niet overeen
      '1': Lage isolatieweerstand naar aarde
      '2': Temperatuur te hoog
      '3': Apparatuurfout
      '4': Ondertemperatuur
      '5': Interne beveiliging
      '6': Thermische doorsmelting
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: ESS  # verify:ignore
  Alarm4Sensor:
    alarm:
      '0': Softwareversie komt niet overeen
      '1': Temperatuur te hoog
      '2': Apparatuurfout
      '3': Overmatige lekstroom in off-grid uitgang
      '4': N-lijn aardingsfout
      '5': Abnormale fasevolgorde netbekabeling
      '6': Abnormale fasevolgorde omvormerbekabeling
      '7': Net fase verlies
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: GW  # verify:ignore
  Alarm5Sensor:
    alarm:
      '0': Softwareversie komt niet overeen
      '1': Lage isolatieweerstand naar aarde
      '2': Overtemperatuur
      '3': Apparatuurfout
