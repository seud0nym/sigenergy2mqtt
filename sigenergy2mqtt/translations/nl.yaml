      '5': Apparatuurbeveiliging
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: EVDC  # verify:ignore
  Alarm6:
    alarm:
      '0': Gateway communicatie abnormaal
      '1': Meter communicatie abnormaal
      '2': AC vermogenssensor communicatie abnormaal
      '6': Harde beveiliging tegen overschrijding netleveringslimiet
      '8': Generator starfout
      '10': CLS-fout
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: 'Alarm 6' # verify:ignore
  Alarm7:
    alarm:
      '0': OVGR-fout
      '1': RPR-fout
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: 'Alarm 7' # verify:ignore
  AlarmCombinedSensor:
    attributes:
