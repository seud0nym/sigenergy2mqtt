class:
  ACCharger:
    name: Sigenergy AC-lader {sequence_suffix}
  ACChargerAlarm1:
    alarm:
      '0': Net overspanning
      '1': Net onderspanning
      '2': Overbelasting
      '3': Kortsluiting
      '4': Laaduitgang overstroom
      '5': Lekstroom buiten limiet
      '6': Aardingsfout
      '7': Abnormale fasevolgorde netbekabeling
      '8': PEN-fout
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: 'Alarm 1' # verify:ignore
  ACChargerAlarm2:
    alarm:
      '0': Fout lekstroomdetectiecircuit
      '1': Relais vastgelopen
      '2': Pilootcircuitfout
      '3': Fout hulpvoedingsmodule
      '4': Elektrisch slot fout
      '5': Communicatiefout lamppaneel
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: 'Alarm 2' # verify:ignore
  ACChargerAlarm3:
    alarm:
      '0': Interne temperatuur te hoog
      '1': Laadkabelfout
      '2': Metercommunicatiefout
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: 'Alarm 3' # verify:ignore
  ACChargerAlarms:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Alarmen
  ACChargerChargingPower:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Laadvermogen
  ACChargerInputBreaker:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Ingangsschakelaar
  ACChargerOutputCurrent:
    attributes:
      comment: "Bereik: [6, kleinste van 'AC Lader Nominale Stroom' en 'AC Lader Ingangsschakelaar Nominale Stroom']"
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Uitgangsstroom
  ACChargerRatedCurrent:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Nominale Stroom
  ACChargerRatedPower:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Nominaal Vermogen
  ACChargerRatedVoltage:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Nominale Spanning
  ACChargerRunningState:
    attributes:
      source: Modbus-register {address}
      source_range: Modbus-registers {start}-{end}
    name: Bedrijfsstatus
    options:
      "0": Initialiseren
      "1": EV niet verbonden
      "2": Lader en EV niet klaar
      "3": Lader klaar; EV niet klaar
      "4": Lader niet klaar; EV klaar
      "5": Laden
      "6": Storing
      "7": Fout
  ACChargerStatus:
    attributes:
      comment: 0:Starten 1:Stoppen
    name: AC Lader Starten/Stoppen
    name_off: Stoppen
    name_on: Starten
  ACChargerTotalEnergyConsumed:
    attributes:
