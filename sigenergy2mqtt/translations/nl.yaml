  SIGENERGY2MQTT_PVOUTPUT_EXT_V7:
    help: "Een bron om het uitgebreide veld v7 in PVOutput te vullen. Je kunt een sensor-klassenaam opgeven, een entiteits-id zonder het voorvoegsel 'sensor.', een direct MQTT-topic (of mqtt:<topic>), of een Home Assistant sensor-entiteits-id (sensor.<id> of ha:sensor.<id>, alleen app). Als dit niet is opgegeven OF je donatiestatus niet actueel is, wordt dit veld niet naar PVOutput verzonden."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V8:
    help: "Een bron om het uitgebreide veld v8 in PVOutput te vullen. Je kunt een sensor-klassenaam opgeven, een entiteits-id zonder het voorvoegsel 'sensor.', een direct MQTT-topic (of mqtt:<topic>), of een Home Assistant sensor-entiteits-id (sensor.<id> of ha:sensor.<id>, alleen app). Als dit niet is opgegeven OF je donatiestatus niet actueel is, wordt dit veld niet naar PVOutput verzonden."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V9:
    help: "Een bron om het uitgebreide veld v9 in PVOutput te vullen. Je kunt een sensor-klassenaam opgeven, een entiteits-id zonder het voorvoegsel 'sensor.', een direct MQTT-topic (of mqtt:<topic>), of een Home Assistant sensor-entiteits-id (sensor.<id> of ha:sensor.<id>, alleen app). Als dit niet is opgegeven OF je donatiestatus niet actueel is, wordt dit veld niet naar PVOutput verzonden."
