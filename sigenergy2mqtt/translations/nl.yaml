  SIGENERGY2MQTT_PVOUTPUT_EXT_V10:
    help: "Een bron om het uitgebreide veld v10 in PVOutput te vullen. Je kunt een sensor-klassenaam opgeven, een entiteits-id zonder het voorvoegsel 'sensor.', een direct MQTT-topic (of mqtt:<topic>), of een Home Assistant sensor-entiteits-id (sensor.<id> of ha:sensor.<id>, alleen app). Als dit niet is opgegeven OF je donatiestatus niet actueel is, wordt dit veld niet naar PVOutput verzonden."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V11:
    help: "Een bron om het uitgebreide veld v11 in PVOutput te vullen. Je kunt een sensor-klassenaam opgeven, een entiteits-id zonder het voorvoegsel 'sensor.', een direct MQTT-topic (of mqtt:<topic>), of een Home Assistant sensor-entiteits-id (sensor.<id> of ha:sensor.<id>, alleen app). Als dit niet is opgegeven OF je donatiestatus niet actueel is, wordt dit veld niet naar PVOutput verzonden."
