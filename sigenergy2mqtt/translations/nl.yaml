cli:
  SIGENERGY2MQTT_CONFIG:
    help: 'De pad naar het YAML-configuratiebestand (standaard: SIGENERGY2MQTT_CONFIG-omgevingsvariabele, anders /etc/sigenergy2mqtt.yaml)'
  SIGENERGY2MQTT_CONSUMPTION:
    help: "Stel de methode in voor het berekenen van de Plant Verbruikt Vermogen sensor. Geldige waarden zijn: 'calculated', 'total' (Totaal Belastingsvermogen register), of 'general' (V2.8 Algemeen Belastingsvermogen register). De standaardwaarde is 'calculated'. Deze optie wordt genegeerd op firmware die ouder is dan de firmware die Modbus Protocol V2.8 ondersteunt."
  SIGENERGY2MQTT_DEBUG_SENSOR:
    help: 'Specificeer een sensor om te debuggen met de volledige of gedeeltelijke entiteit-ID of de sensorklassenaam (bijv. ''daily'' komt overeen met alle sensoren met ''daily'' in hun naam), of een reguliere expressie die vergeleken wordt met de entiteit-ID of sensorklassenaam (bijv. ''^PowerFactor$'' komt alleen overeen met de enkele klassenaam). Indien opgegeven, wordt --log-level ook geforceerd naar DEBUG.'
  SIGENERGY2MQTT_HASS_DEVICE_NAME_PREFIX:
    help: 'Het voorvoegsel voor Home Assistant entiteitsnamen'
  SIGENERGY2MQTT_HASS_DISCOVERY_PREFIX:
    help: 'Het Home Assistant MQTT Discovery topic-voorvoegsel (standaard: homeassistant)'
  SIGENERGY2MQTT_HASS_EDIT_PCT_BOX:
    help: 'Gebruik numerieke invoer (true) of schuifregelaar (false) voor percentagesensoren.'
  SIGENERGY2MQTT_HASS_ENABLED:
    help: 'Schakel auto-discovery in Home Assistant in.'
  SIGENERGY2MQTT_HASS_ENTITY_ID_PREFIX:
    help: 'Het voorvoegsel voor Home Assistant entiteit-IDs (standaard: sigen)'
  SIGENERGY2MQTT_HASS_SIGENERGY_LOCAL_MODBUS_NAMING:
    help: 'Gebruik Sigenergy-Local-Modbus entity_id-, gain- en eenheidskoppelingen voor compatibele sensoren.'
  SIGENERGY2MQTT_HASS_UNIQUE_ID_PREFIX:
    help: 'Het voorvoegsel voor Home Assistant unieke IDs. Voorbeeld: Een voorvoegsel van ''prefix'' zal ''prefix_'' voorafgaan aan unieke IDs (standaard: sigen). Zodra u dit heeft ingesteld, mag u dit NOOIT meer wijzigen, omdat dit bestaande entiteiten in Home Assistant zal verbreken.'
  SIGENERGY2MQTT_HASS_USE_SIMPLIFIED_TOPICS:
    help: 'Gebruik vereenvoudigde topic-structuur (sigenergy2mqtt/object_id/state)'
  SIGENERGY2MQTT_INFLUX_BATCH_SIZE:
    help: 'InfluxDB-batchgrootte (standaard: 100)'
  SIGENERGY2MQTT_INFLUX_BUCKET:
    help: Naam van de InfluxDB v2 bucket (standaard --influxdb-database indien niet ingesteld)
  SIGENERGY2MQTT_INFLUX_DATABASE:
    help: 'InfluxDB database om metingen naar te schrijven (standaard: sigenergy)'
  SIGENERGY2MQTT_INFLUX_DEFAULT_MEASUREMENT:
    help: 'De standaard meetnaam om te gebruiken voor InfluxDB-updates als een sensor geen meeteenheid heeft gedefinieerd (standaard: state)'
  SIGENERGY2MQTT_INFLUX_ENABLED:
    help: Schakel het verzenden van metingen naar InfluxDB in.
  SIGENERGY2MQTT_INFLUX_EXCLUDE:
    help: Lijst van sensor-ID's om uit te sluiten (gescheiden door spaties)
  SIGENERGY2MQTT_INFLUX_FLUSH_INTERVAL:
    help: 'InfluxDB flush-interval in seconden (standaard: 1.0)'
  SIGENERGY2MQTT_INFLUX_HOST:
    help: 'Hostnaam of IP-adres van InfluxDB (standaard: 127.0.0.1)'
  SIGENERGY2MQTT_INFLUX_INCLUDE:
    help: Lijst van sensor-ID's om op te nemen (gescheiden door spaties)
  SIGENERGY2MQTT_INFLUX_LOAD_HASS_HISTORY:
    help: Geef aan om historische gegevens te laden uit de Home Assistant InfluxDB-database. Dit werkt alleen als sigenergy2mqtt is geconfigureerd om dezelfde InfluxDB-server als Home Assistant te gebruiken met dezelfde inloggegevens.
  SIGENERGY2MQTT_INFLUX_LOG_LEVEL:
    help: 'Logniveau van het InfluxDB-subsysteem. Geldige waarden zijn: DEBUG, INFO, WARNING, ERROR of CRITICAL. Standaard is WARNING (waarschuwingen, fouten en kritieke storingen)'
  SIGENERGY2MQTT_INFLUX_MAX_RETRIES:
    help: 'InfluxDB maximaal aantal nieuwe pogingen (standaard: 3)'
  SIGENERGY2MQTT_INFLUX_MAX_SYNC_WORKERS:
    help: 'InfluxDB maximaal aantal sync workers (standaard: 4)'
  SIGENERGY2MQTT_INFLUX_ORG:
    help: Naam of ID van de InfluxDB-organisatie
  SIGENERGY2MQTT_INFLUX_PASSWORD:
    help: Wachtwoord van InfluxDB
  SIGENERGY2MQTT_INFLUX_POOL_CONNECTIONS:
    help: 'Grootte van InfluxDB-verbindingspool (standaard: 100)'
  SIGENERGY2MQTT_INFLUX_POOL_MAXSIZE:
    help: 'Maximale grootte van InfluxDB-verbindingspool (standaard: 100)'
  SIGENERGY2MQTT_INFLUX_PORT:
    help: 'Poort van InfluxDB (standaard: 8086)'
  SIGENERGY2MQTT_INFLUX_QUERY_INTERVAL:
    help: 'InfluxDB query-interval in seconden (standaard: 0.5)'
  SIGENERGY2MQTT_INFLUX_READ_TIMEOUT:
    help: 'InfluxDB lees-timeout in seconden (standaard: 120.0)'
  SIGENERGY2MQTT_INFLUX_SYNC_CHUNK_SIZE:
    help: 'InfluxDB sync chunk grootte (standaard: 1000)'
  SIGENERGY2MQTT_INFLUX_TOKEN:
    help: InfluxDB v2 authenticatietoken (geeft de voorkeur aan v2 API's indien verstrekt)
  SIGENERGY2MQTT_INFLUX_USERNAME:
    help: Gebruikersnaam van InfluxDB
  SIGENERGY2MQTT_INFLUX_WRITE_TIMEOUT:
    help: 'InfluxDB schrijf-timeout in seconden (standaard: 30.0)'
  SIGENERGY2MQTT_LANGUAGE:
    help: 'Stelt de taal in die gebruikt moet worden voor vertalingen. De standaardwaarde wordt bepaald door het systeem (bijv. de LANG-omgevingsvariabele) of Engels als er geen alternatief wordt gevonden.'
  SIGENERGY2MQTT_LOG_FMT:
    help: 'Het logformaat instellen. De standaardwaarde is afhankelijk van de uitvoeringsomgeving.'
  SIGENERGY2MQTT_LOG_LEVEL:
    help: 'Stel het logniveau in. Geldige waarden: DEBUG, INFO, WARNING, ERROR of CRITICAL. Standaard: WARNING'
  SIGENERGY2MQTT_MODBUS_ACCHARGER_DEVICE_ID:
    help: 'De Sigenergy AC-lader Modbus Apparaat-ID. Er kunnen meerdere apparaat-IDs worden opgegeven, gescheiden door komma''s.'
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY:
    help: 'Probeer Sigenergy Modbus-hosts en apparaat-IDs automatisch te ontdekken. Indien ''once'' is opgegeven, vindt auto-discovery alleen plaats als er geen bestaande resultaten voor automatische detectie gevonden zijn. Indien ''force'', zal auto-discovery alle eerder ontdekte Modbus-hosts en apparaat-IDs overschrijven. Indien niet opgegeven, is auto-discovery uitgeschakeld.'
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_EXCLUDE:
    help: Een door komma's gescheiden lijst met apparaatklassenamen die moeten worden uitgesloten van automatische detectie. De standaardinstelling is 'PID,PSS'.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_NETWORKS:
    help: Een door komma's gescheiden lijst van IPv4-netwerken in CIDR-notatie om te scannen tijdens automatische detectie (bijv. '192.168.1.0/24,10.0.0.0/24'). Gebruik dit om netwerken te scannen die toegankelijk zijn via routering maar niet rechtstreeks zijn aangesloten op een netwerkinterface.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_PING_TIMEOUT:
    help: 'Ping-timeout in seconden voor auto-discovery. Standaard: 0,5 seconden.'
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_RETRIES:
    help: 'Maximum aantal Modbus-herhalingen voor auto-discovery. Standaard: 0.'
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_TIMEOUT:
    help: 'Modbus-timeout in seconden voor auto-discovery. Standaard: 0,25 seconden.'
  SIGENERGY2MQTT_MODBUS_DCCHARGER_DEVICE_ID:
    help: 'De Sigenergy DC-lader Modbus Apparaat-ID. Er kunnen meerdere apparaat-IDs worden opgegeven, gescheiden door komma''s.'
  SIGENERGY2MQTT_MODBUS_DISABLE_CHUNKING:
    help: 'Schakel Modbus-chunking uit bij het lezen van registers.'
  SIGENERGY2MQTT_MODBUS_HOST:
    help: 'De hostnaam of IP-adres van het Sigenergy-apparaat'
  SIGENERGY2MQTT_MODBUS_INVERTER_DEVICE_ID:
    help: 'De Sigenergy Omvormer Modbus Apparaat-ID. Er kunnen meerdere apparaat-IDs worden opgegeven, gescheiden door komma''s.'
  SIGENERGY2MQTT_MODBUS_LOG_LEVEL:
    help: 'Stel het pymodbus-logniveau in.'
  SIGENERGY2MQTT_MODBUS_LOG_SKIPPED:
    help: Registreer overgeslagen Modbus-verzoeken.
  SIGENERGY2MQTT_MODBUS_NO_REMOTE_EMS:
    help: 'Publiceer geen lees-schrijf sensoren voor remote EMS-integratie.'
  SIGENERGY2MQTT_MODBUS_PID_DEVICE_ID:
    help: De Sigenergy PID Modbus-apparaat-ID. Er kunnen meerdere apparaat-ID's worden opgegeven, gescheiden door komma's.
  SIGENERGY2MQTT_MODBUS_PORT:
    help: 'Het Sigenergy Modbus-poortnummer (standaard: 502)'
  SIGENERGY2MQTT_MODBUS_PSS_DEVICE_ID:
    help: De Sigenergy PSS Modbus-apparaat-ID. Er kunnen meerdere apparaat-ID's worden opgegeven, gescheiden door komma's.
  SIGENERGY2MQTT_MODBUS_READ_ONLY:
    help: 'Publiceer alleen alleen-lezen sensoren naar MQTT.'
  SIGENERGY2MQTT_MODBUS_RETRIES:
    help: 'Maximum aantal herhalingen voor Modbus-operaties. Standaard: 3.'
  SIGENERGY2MQTT_MODBUS_TIMEOUT:
    help: 'Timeout voor Modbus-verbinding in seconden. Standaard: 1,0.'
  SIGENERGY2MQTT_MQTT_ANONYMOUS:
    help: Sta anonieme verbinding toe (zonder gebruikersnaam/wachtwoord).
  SIGENERGY2MQTT_MQTT_BROKER:
    help: 'De hostnaam of IP-adres van de MQTT-broker (standaard: 127.0.0.1)'
  SIGENERGY2MQTT_MQTT_KEEPALIVE:
    help: Maximale periode in seconden tussen communicaties met de broker. Standaard 60, minimum 1.
  SIGENERGY2MQTT_MQTT_LOG_LEVEL:
    help: Stel het paho.mqtt-logniveau in.
  SIGENERGY2MQTT_MQTT_PASSWORD:
    help: Een geldig wachtwoord voor de MQTT-broker
  SIGENERGY2MQTT_MQTT_PORT:
    help: De luisterpoort van de MQTT-broker (standaard is 1883, tenzij --mqtt-tls is opgegeven, in welk geval de standaard 8883 is)
  SIGENERGY2MQTT_MQTT_TLS:
    help: Schakel beveiligde communicatie via TLS/SSL in.
  SIGENERGY2MQTT_MQTT_TLS_INSECURE:
    help: Sta onveilige TLS-communicatie toe voor zelfondertekende certificaten.
  SIGENERGY2MQTT_MQTT_TRANSPORT:
    help: 'Stel MQTT-transportmechanisme in: websockets of tcp. Standaard: tcp.'
  SIGENERGY2MQTT_MQTT_USERNAME:
    help: Een geldige gebruikersnaam voor de MQTT-broker
  SIGENERGY2MQTT_NO_EMS_MODE_CHECK:
    help: 'Schakel validatie uit die ESS Max Laden/Ontladen en PV Max Vermogen limieten uitschakelt wanneer de Externe EMS Regelmodus niet op Commando Laden/Ontladen staat.'
  SIGENERGY2MQTT_NO_METRICS:
    help: 'Publiceer geen sigenergy2mqtt-statistieken.'
  SIGENERGY2MQTT_PERSISTENCE_CACHE_WARMUP_TIMEOUT:
    help: 'Maximale seconden om te wachten op de bewaarde MQTT-toestand tijdens het opwarmen van de opstartcache (standaard: 10.0, bereik: 1-60)'
  SIGENERGY2MQTT_PERSISTENCE_DEBUG:
    help: Schakel logboekregistratie voor foutopsporing in voor alle statusopslagbewerkingen (persistentie).
  SIGENERGY2MQTT_PERSISTENCE_MQTT_REDUNDANCY:
    help: 'MQTT-berichtredundantie voor toestandspersistentie uitschakelen. Indien ingesteld, wordt de toestand alleen op schijf opgeslagen.'
  SIGENERGY2MQTT_PERSISTENCE_MQTT_STATE_PREFIX:
    help: 'MQTT-topic-prefix voor persistente toestandsberichten (standaard: sigenergy2mqtt/_state)'
  SIGENERGY2MQTT_PERSISTENCE_SYNC_TIMEOUT:
    help: 'Time-out in seconden voor synchrone persistentie-operaties wanneer aangeroepen vanuit een niet-asyncio thread (standaard: 5.0, bereik: 0.1-30.0)'
  SIGENERGY2MQTT_PVOUTPUT_API_KEY:
