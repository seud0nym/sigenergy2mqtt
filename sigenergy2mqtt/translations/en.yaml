class:
  ACCharger:
    name: Sigenergy AC Charger {sequence_suffix}
  ACChargerAlarm1:
    alarm:
      '0': Grid over-voltage
      '1': Grid under-voltage
      '2': Overload
      '3': Short circuit
      '4': Charging output over-current
      '5': Leak current out of limit
      '6': Grounding fault
      '7': Abnormal phase sequence of grid wiring
      '8': PEN Fault
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Alarm 1
  ACChargerAlarm2:
    alarm:
      '0': Leak current detection circuit fault
      '1': Relay stuck
      '2': Pilot circuit fault
      '3': Auxiliary power supply module fault
      '4': Electric lock fault
      '5': Lamp panel communication fault
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Alarm 2
  ACChargerAlarm3:
    alarm:
      '0': Too high internal temperature
      '1': Charging cable fault
      '2': Meter communication fault
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Alarm 3
  ACChargerAlarms:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Alarms
  ACChargerChargingPower:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Charging Power
  ACChargerInputBreaker:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Input Breaker
  ACChargerOutputCurrent:
    attributes:
      comment: "Range: [6, smaller of 'AC-Charger Rated Current' and 'AC-Charger Input Breaker Rated Current']"
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Output Current
  ACChargerRatedCurrent:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Rated Current
  ACChargerRatedPower:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Rated Power
  ACChargerRatedVoltage:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Rated Voltage
  ACChargerRunningState:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Running State
    options:
      '0': Initialising
      '1': EV not connected
      '2': Charger and EV not ready
      '3': Charger ready; EV not ready
      '4': Charger not ready; EV ready
      '5': Charging
      '6': Fault
      '7': Error
  ACChargerStatus:
    attributes:
      comment: 0:Start 1:Stop
    name: AC Charger Stop/Start
    name_off: Stop
    name_on: Start
  ACChargerTotalEnergyConsumed:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Total Energy Consumed
  AccumulatedChargeEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Lifetime Charge Energy
  AccumulatedDischargeEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Lifetime Discharge Energy
  ActivePower:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Active Power
  ActivePowerFixedAdjustmentTargetValue:
    attributes:
      comment: Remote EMS must be enabled and the EMS must be in PCS Remote Control Mode for this register to take effect.
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Active Power Fixed Adjustment Target Value
  ActivePowerPercentageAdjustmentTargetValue:
    attributes:
      comment: 'Range: [-100.00,100.00]. Remote EMS must be enabled and the EMS must be in PCS Remote Control Mode for this register to take effect.'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Active Power Percentage Adjustment Target Value
  ActivePowerRegulationGradient:
    attributes:
      comment: Range:[0,5000]。Percentage of rated power adjusted per second
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Active Power Regulation Gradient
  Alarm1Sensor:
    alarm:
      '0': Software version mismatch
      '1': Low insulation resistance
      '2': Over-temperature
      '3': Equipment fault
      '4': System grounding fault
      '5': PV string over-voltage
      '6': PV string reversely connected
      '7': PV string back-filling
      '8': AFCI fault
      '9': Grid power outage
      '10': Grid over-voltage
      '11': Grid under-voltage
      '12': Grid over-frequency
      '13': Grid under-frequency
      '14': Grid voltage imbalance
      '15': DC component of output current out of limit
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: PCS
  Alarm2Sensor:
    alarm:
      '0': Leak current out of limit
      '1': Communication abnormal
      '2': System internal protection
      '3': AFCI self-checking circuit fault
      '4': Off-grid protection
      '5': Manual operation protection
      '7': Abnormal phase sequence
      '8': Short circuit to PE
      '9': Soft start failure
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: PCS
  Alarm3Sensor:
    alarm:
      '0': Software version mismatch
      '1': Low insulation resistance to ground
      '2': Temperature too high
      '3': Equipment fault
      '4': Under-temperature
      '5': Internal protection
      '6': Thermal runaway
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: ESS
  Alarm4Sensor:
    alarm:
      '0': Software version mismatch
      '1': Temperature too high
      '2': Equipment fault
      '3': Excessive leakage current in off-grid output
      '4': N line grounding fault
      '5': Abnormal phase sequence of grid wiring
      '6': Abnormal phase sequence of inverter wiring
      '7': Grid phase loss
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: GW
  Alarm5Sensor:
    alarm:
      '0': Software version mismatch
      '1': Low insulation resistance to ground
      '2': Over-temperature
      '3': Equipment fault
      '4': Charging fault
      '5': Equipment protection
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: EVDC
  Alarm6:
    alarm:
      '0': Gateway communication abnormal
      '1': Meter communication abnormal
      '2': AC power sensor communication abnormal
      '6': Hard protection against grid-feed power limit exceeding
      '8': Generator failure to start
      '10': CLS fault
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Alarm 6
  Alarm7:
    alarm:
      '0': OVGR fault
      '1': RPR Fault
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Alarm 7
  AlarmCombinedSensor:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Hybrid Inverter
  AlarmSensor:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    no_alarm: No Alarm
    unknown_alarm: Unknown (bit{bit}∈{value})
  AvailableBatteryChargeEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Charge Energy
  AvailableBatteryDischargeEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Discharge Energy
  AvailableMaxActivePower:
    attributes:
      comment: Feed to the AC terminal. Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Max Active Power
  AvailableMaxChargingCapacity:
    attributes:
      comment: Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Max Charging Capacity
  AvailableMaxChargingPower:
    attributes:
      comment: Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Max Charging Power
  AvailableMaxDischargingCapacity:
    attributes:
      comment: Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Max Discharging Capacity
  AvailableMaxDischargingPower:
    attributes:
      comment: Absorb from the AC terminal. Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Max Discharging Power
  AvailableMaxReactivePower:
    attributes:
      comment: Feed to the AC terminal. Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Max Reactive Power
  AvailableMinActivePower:
    attributes:
      comment: Absorb from the AC terminal. Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Min Active Power
  AvailableMinReactivePower:
    attributes:
      comment: Absorb from the AC terminal. Count only the running inverters
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Available Min Reactive Power
  AverageCellTemperature:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Average Cell Temperature
  AverageCellVoltage:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Average Cell Voltage
  BatteryChargingPower:
    attributes:
      source: BatteryPower > 0
    name: Battery Charging Power
  BatteryDischargingPower:
    attributes:
      source: BatteryPower < 0 × -1
    name: Battery Discharging Power
  BatteryPower:
    attributes:
      comment: 'ESS Power: <0 = discharging >0 = charging'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Battery Power
  ChargeCutOffSoC:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Charge Cut-Off SoC
  ChargeDischargePower:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Battery Power
  CurrentControlCommandValue:
    attributes:
      comment: Use of Remote Output Control in Japan
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Current Control Command Value
  DCCharger:
    name: Sigenergy DC Charger {sequence_suffix}
  DCChargerCurrentChargingCapacity:
    attributes:
      comment: Single time
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Current Charging Capacity
  DCChargerCurrentChargingDuration:
    attributes:
      comment: Single time
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Current Charging Duration
  DCChargerCurrentDischargingCapacity:
    attributes:
      comment: Single time
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Current Discharging Capacity
  DCChargerCurrentDischargingDuration:
    attributes:
      comment: Single time
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Current Discharging Duration
  DCChargerDischargingCurrent:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Discharging Current
  DCChargerMaxChargingPowerLimit:
    attributes:
      comment: Maximum DC charger charging power limit
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Max Charging Power Limit
  DCChargerMaxDischargingPowerLimit:
    attributes:
      comment: Maximum DC charger discharging power limit
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Max Discharging Power Limit
  DCChargerOutputPower:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Output Power
  DCChargerRatedChargingPower:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Rated Charging Power
  DCChargerRatedDischargingPower:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Rated Discharging Power
  DCChargerRunningState:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Running State
    options:
      '0': Idle
      '1': Occupied (Charging Gun plugged in but not detected)
      '2': Preparing (Establishing communication)
      '3': Charging
      '4': Fault
      '5': Scheduled
  DCChargerStatus:
    attributes:
      comment: 0:Start 1:Stop
    name: DC Charger Stop/Start
    name_off: Stop
    name_on: Start
  DCChargerTotalChargingCapacity:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Total Charging Capacity
  DCChargerTotalDischargingCapacity:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Total Discharging Capacity
  DCChargerVehicleBatteryVoltage:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Vehicle Battery Voltage
  DCChargerVehicleChargingCurrent:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Vehicle Charging Current
  DCChargerVehicleSoC:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Vehicle SoC
  DailyChargeEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Daily Charge Energy
  DailyDischargeEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Daily Discharge Energy
  DischargeCutOffSoC:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Discharge Cut-Off SoC
  DistributionCabinet:
    name: '{model_id} {serial} Distribution Cabinet'
  EMSWorkMode:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: EMS Work Mode
    options:
      '0': Max Self Consumption
      '1': Sigen AI # verify:ignore
      '2': Time of Use
      '5': Full Feed-in to Grid
      '6': VPP Scheduling
      '7': Remote EMS
      '9': Time-Based Control
  ESS:
    name: '{model_id} {serial_number} ESS'
  ESSAverageCellTemperature:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Average Cell Temperature
  ESSBackupSOC:
    attributes:
      comment: 'Range: [0.00,100.00]'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Backup SoC
  ESSChargeCutOffSOC:
    attributes:
      comment: 'Range: [0.00,100.00]'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Charge Cut-Off SoC
  ESSDischargeCutOffSOC:
    attributes:
      comment: 'Range: [0.00,100.00]'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Discharge Cut-Off SoC
  ESSPreHeating:
    name: Sigenergy Plant ESS Pre-Heating {plant_suffix}
  ESSPreHeatingAdvanceEnable:
    attributes:
      comment: '0: Disable, 1: Enable. Takes effect when Preheating Mode is Manual.'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Preheating Advance
  ESSPreHeatingEnable:
    attributes:
      comment: '0: Disable, 1: Enable'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Preheating
  ESSPreHeatingMode:
    attributes:
      comment: '0: Automatic, 1: Manual'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Preheating Mode
    options:
      '0': Automatic
      '1': Manual
  ESSPreHeatingReservedSOC:
    attributes:
      comment: 'Range: [0.00,100.00]'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Preheating Reserved SoC
  ESSPreHeatingTOUTargetPower:
    attributes:
      comment: '<0: discharging, >0: charging'
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: TOU {slot} Target Charging/Discharging Power
  ESSPreHeatingTOUTime:
    attributes:
      comment: Epoch seconds with timezone; local time interpretation depends on the device.
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Hybrid Inverter
  ESSPreHeatingTOUTimeEnd:
    attributes:
      comment: Epoch seconds with timezone; local time interpretation depends on the device.
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: TOU {slot} End
  ESSPreHeatingTOUTimeStart:
    attributes:
      comment: Epoch seconds with timezone; local time interpretation depends on the device.
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: TOU {slot} Start
  ESSTotalChargedEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Lifetime Charge Energy
  ESSTotalDischargedEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Lifetime Discharge Energy
  EVDCTotalChargedEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Lifetime DC EV Charge Energy
  EVDCTotalDischargedEnergy:
    attributes:
      source: Modbus Register {address}
      source_range: Modbus Registers {start}-{end}
    name: Lifetime DC EV Discharge Energy
