cli:
  SIGENERGY2MQTT_CONFIG:
    help: 'The path to the YAML configuration file (default: SIGENERGY2MQTT_CONFIG env var, otherwise /etc/sigenergy2mqtt.yaml)'
  SIGENERGY2MQTT_CONSUMPTION:
    help: "Set the method of calculating the Plant Consumed Power sensor. Valid values are: 'calculated', 'total' (Total Load Power register), or 'general' (V2.8 General Load Power register). The default is 'total'. This option is ignored on firmware earlier than that supporting Modbus Protocol V2.8."
  SIGENERGY2MQTT_DEBUG_SENSOR:
    help: Specify a sensor to be debugged using either the full or partial entity id or sensor class name (e.g. specifying 'daily' would match all sensors with daily in their entity name), or a regular expression to be matched against the entity id or sensor class name (e.g. '^PowerFactor$' only matches the single class name). If specified, --log-level is also forced to DEBUG.
  SIGENERGY2MQTT_HASS_DEVICE_NAME_PREFIX:
    help: "The prefix to use for Home Assistant entity names. Example: A prefix of 'prefix' will prepend 'prefix ' to names (default: '')"
  SIGENERGY2MQTT_HASS_DISCOVERY_PREFIX:
    help: 'The Home Assistant MQTT Discovery topic prefix to use (default: homeassistant)'
  SIGENERGY2MQTT_HASS_EDIT_PCT_BOX:
    help: When editing percentage sensors, use a numeric entry box to change the value (true) or use a slider to change the value (false).
  SIGENERGY2MQTT_HASS_ENABLED:
    help: Enable auto-discovery in Home Assistant.
  SIGENERGY2MQTT_HASS_ENTITY_ID_PREFIX:
    help: "The prefix to use for Home Assistant entity IDs. Example: A prefix of 'prefix' will prepend 'prefix_' to entity IDs (default: sigen)"
  SIGENERGY2MQTT_HASS_SIGENERGY_LOCAL_MODBUS_NAMING:
    help: Use Sigenergy-Local-Modbus entity_id, gain and unit naming conventions for mapped Modbus sensors. If enabled, --hass-entity-id-prefix must be 'sigen' (default).
  SIGENERGY2MQTT_HASS_UNIQUE_ID_PREFIX:
    help: "The prefix to use for Home Assistant unique IDs. Example: A prefix of 'prefix' will prepend 'prefix_' to unique IDs (default: sigen). Once you have set this, you should NEVER change it, as it will break existing entities in Home Assistant."
  SIGENERGY2MQTT_HASS_USE_SIMPLIFIED_TOPICS:
    help: Enable the simplified topic structure (sigenergy2mqtt/object_id/state) instead of the full Home Assistant topic structure (homeassistant/platform/device_id/object_id/state)
  SIGENERGY2MQTT_INFLUX_BATCH_SIZE:
    help: 'InfluxDB batch size (default: 100)'
  SIGENERGY2MQTT_INFLUX_BUCKET:
    help: InfluxDB v2 bucket name (defaults to --influxdb-database if not set)
  SIGENERGY2MQTT_INFLUX_DATABASE:
    help: 'InfluxDB database to write metrics to (default: sigenergy)'
  SIGENERGY2MQTT_INFLUX_DEFAULT_MEASUREMENT:
    help: 'The default measurement name to use for InfluxDB updates if a sensor does not have a Unit of Measurement defined (default: state)'
  SIGENERGY2MQTT_INFLUX_ENABLED:
    help: Enable sending of sensor data to InfluxDB.
  SIGENERGY2MQTT_INFLUX_EXCLUDE:
    help: Specify sensors to be excluded from InfluxDB updates using either the full or partial entity id or sensor class name (e.g. specifying 'daily' would match all sensors with daily in their entity name), or a regular expression to be matched against the entity id or sensor class name (e.g. '^PowerFactor$' only matches the single class name).
  SIGENERGY2MQTT_INFLUX_FLUSH_INTERVAL:
    help: 'InfluxDB flush interval in seconds (default: 1.0)'
  SIGENERGY2MQTT_INFLUX_HOST:
    help: 'InfluxDB hostname or IP address (default: 127.0.0.1)'
  SIGENERGY2MQTT_INFLUX_INCLUDE:
    help: Specify sensors to be included in InfluxDB updates using either the full or partial entity id or sensor class name (e.g. specifying 'daily' would match all sensors with daily in their entity name), or a regular expression to be matched against the entity id or sensor class name (e.g. '^PowerFactor$' only matches the single class name).
  SIGENERGY2MQTT_INFLUX_LOAD_HASS_HISTORY:
    help: Specify to load historical data from the Home Assistant InfluxDB database. This will only work if sigenergy2mqtt is configured to use the same InfluxDB server as Home Assistant with the same credentials.
  SIGENERGY2MQTT_INFLUX_LOG_LEVEL:
    help: 'InfluxDB subsystem log level. Valid values are: DEBUG, INFO, WARNING, ERROR or CRITICAL. Default is WARNING (warnings, errors and critical failures)'
  SIGENERGY2MQTT_INFLUX_MAX_RETRIES:
    help: 'InfluxDB maximum retries (default: 3)'
  SIGENERGY2MQTT_INFLUX_MAX_SYNC_WORKERS:
    help: 'InfluxDB maximum sync workers (default: 4)'
  SIGENERGY2MQTT_INFLUX_ORG:
    help: InfluxDB organization name or ID
  SIGENERGY2MQTT_INFLUX_PASSWORD:
    help: InfluxDB password
  SIGENERGY2MQTT_INFLUX_POOL_CONNECTIONS:
    help: 'InfluxDB connection pool size (default: 100)'
  SIGENERGY2MQTT_INFLUX_POOL_MAXSIZE:
    help: 'InfluxDB connection pool max size (default: 100)'
  SIGENERGY2MQTT_INFLUX_PORT:
    help: 'InfluxDB port (default: 8086)'
  SIGENERGY2MQTT_INFLUX_QUERY_INTERVAL:
    help: 'InfluxDB query interval in seconds (default: 0.5)'
  SIGENERGY2MQTT_INFLUX_READ_TIMEOUT:
    help: 'InfluxDB read timeout in seconds (default: 120.0)'
  SIGENERGY2MQTT_INFLUX_SYNC_CHUNK_SIZE:
    help: 'InfluxDB sync chunk size (default: 1000)'
  SIGENERGY2MQTT_INFLUX_TOKEN:
    help: InfluxDB v2 authentication token (prefer v2 APIs when supplied)
  SIGENERGY2MQTT_INFLUX_USERNAME:
    help: InfluxDB username
  SIGENERGY2MQTT_INFLUX_WRITE_TIMEOUT:
    help: 'InfluxDB write timeout in seconds (default: 30.0)'
  SIGENERGY2MQTT_LANGUAGE:
    help: 'Set the language to use for translations. Valid values are: {i18n}. The default is determined from the system (e.g. LANG environment variable) or English if no alternative is found.'
  SIGENERGY2MQTT_LOG_FMT:
    help: 'Set the log format. The default depends on the runtime environment.'
  SIGENERGY2MQTT_LOG_LEVEL:
    help: 'Set the log level. Valid values are: DEBUG, INFO, WARNING, ERROR or CRITICAL. Default is WARNING (warnings, errors and critical failures)'
  SIGENERGY2MQTT_MODBUS_ACCHARGER_DEVICE_ID:
    help: The Sigenergy AC Charger Modbus Device ID. Multiple device IDS may be specified, separated by commas.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY:
    help: Attempt to auto-discover Sigenergy Modbus hosts and device IDs. If 'once' is specified, auto-discovery will only occur if no existing auto-discovery results are found. If 'force', auto-discovery will overwrite any previously discovered Modbus hosts and device IDs. If not specified, auto-discovery is disabled.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_EXCLUDE:
    help: A comma-separated list of Device class names to be excluded from auto-discovery. The defaults is 'PID,PSS'.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_MAX_DEVICE_ID:
    help: The maximum device ID to use when performing auto-discovery of Sigenergy devices on the network. The default is 10, and it must be between 1 and 246 (inclusive).
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_NETWORKS:
    help: A comma-separated list of IPv4 networks in CIDR notation to scan during auto-discovery (e.g. '192.168.1.0/24,10.0.0.0/24'). Use this to scan networks that are accessible via routing but not directly attached to a network interface.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_PING_TIMEOUT:
    help: The ping timeout, in seconds, to use when performing auto-discovery of Sigenergy devices on the network. The default is 0.5 seconds.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_RETRIES:
    help: The Modbus maximum retry count to use when performing auto-discovery of Sigenergy devices on the network. The default is 0.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_TIMEOUT:
    help: The Modbus timeout, in seconds, to use when performing auto-discovery of Sigenergy devices on the network. The default is 0.5 seconds.
  SIGENERGY2MQTT_MODBUS_DCCHARGER_DEVICE_ID:
    help: The Sigenergy DC Charger Modbus Device ID. Multiple device IDS may be specified, separated by commas.
  SIGENERGY2MQTT_MODBUS_DISABLE_CHUNKING:
    help: Disable Modbus chunking when reading registers and read each register individually.
  SIGENERGY2MQTT_MODBUS_HOST:
    help: The hostname or IP address of the Sigenergy device
  SIGENERGY2MQTT_MODBUS_INVERTER_DEVICE_ID:
    help: '**The Sigenergy Inverter Modbus Device ID. Multiple device IDS may be specified, separated by commas.'
  SIGENERGY2MQTT_MODBUS_LOG_LEVEL:
    help: 'Set the pymodbus log level. Valid values are: DEBUG, INFO, WARNING, ERROR or CRITICAL. Default is WARNING (warnings, errors and critical failures)'
  SIGENERGY2MQTT_MODBUS_LOG_SKIPPED:
    help: Log skipped Modbus requests.
  SIGENERGY2MQTT_MODBUS_NO_REMOTE_EMS:
    help: Do not publish any read-write sensors for remote Energy Management System (EMS) integration to MQTT. Ignored if --modbus-read-only is specified.
  SIGENERGY2MQTT_MODBUS_PID_DEVICE_ID:
    help: The Sigenergy PID Modbus Device ID. Multiple device IDS may be specified, separated by commas.
  SIGENERGY2MQTT_MODBUS_PORT:
    help: 'The Sigenergy device Modbus port number (default: 502)'
  SIGENERGY2MQTT_MODBUS_PSS_DEVICE_ID:
    help: The Sigenergy PSS Modbus Device ID. Multiple device IDS may be specified, separated by commas.
  SIGENERGY2MQTT_MODBUS_READ_ONLY:
    help: Only publish read-only sensors to MQTT. Neither read-write or write-only sensors will be published if specified.
  SIGENERGY2MQTT_MODBUS_RETRIES:
    help: The maximum number of times to retry a Modbus operation if it fails. The default is 3.
  SIGENERGY2MQTT_MODBUS_TIMEOUT:
    help: The timeout for connecting and receiving Modbus data, in seconds (use decimals for milliseconds). The default is 1.0.
  SIGENERGY2MQTT_MQTT_ANONYMOUS:
    help: Allow anonymous connection to MQTT broker (i.e. without username/password). If specified, the --mqtt-username and --mqtt-password options are ignored.
  SIGENERGY2MQTT_MQTT_BROKER:
    help: 'The hostname or IP address of an MQTT broker (default: 127.0.0.1)'
  SIGENERGY2MQTT_MQTT_KEEPALIVE:
    help: The maximum period in seconds between communications with the broker. If no other messages are being exchanged, this controls the rate at which the client will send ping messages to the broker. Default is 60 and minimum is 1.
  SIGENERGY2MQTT_MQTT_LOG_LEVEL:
    help: 'Set the paho.mqtt log level. Valid values are: DEBUG, INFO, WARNING, ERROR or CRITICAL. Default is WARNING (warnings, errors and critical failures)'
  SIGENERGY2MQTT_MQTT_PASSWORD:
    help: A valid password for the MQTT broker username
  SIGENERGY2MQTT_MQTT_PORT:
    help: The listening port of the MQTT broker (default is 1883, unless --mqtt-tls is specified, in which case the default is 8883)
  SIGENERGY2MQTT_MQTT_TLS:
    help: Enable secure communication to MQTT broker over TLS/SSL. If specified, the default MQTT port is 8883.
  SIGENERGY2MQTT_MQTT_TLS_INSECURE:
    help: Enables insecure communication over TLS. If your broker is using a self-signed certificate, you must specify this option. Ignored unless --mqtt-tls is also specified.
  SIGENERGY2MQTT_MQTT_TRANSPORT:
    help: Sets the MQTT transport mechanism. Must be one of websockets or tcp. The default is tcp.
  SIGENERGY2MQTT_MQTT_USERNAME:
    help: A valid username for the MQTT broker
  SIGENERGY2MQTT_NO_EMS_MODE_CHECK:
    help: Turn off validation that disables ESS Max Charging/Discharging and PV Max Power limits when Remote EMS Control Mode is not Command Charging/Discharging. This option is ignored for firmware SPC113 and later as these limits are globally available in those versions.
  SIGENERGY2MQTT_NO_METRICS:
    help: Do not publish any sigenergy2mqtt metrics.
  SIGENERGY2MQTT_PERSISTENCE_CACHE_WARMUP_TIMEOUT:
    help: 'Maximum seconds to wait for MQTT retained state during startup cache warming (default: 10.0, range: 1-60)'
  SIGENERGY2MQTT_PERSISTENCE_DEBUG:
    help: Enable debug logging for all state store (persistence) operations.
  SIGENERGY2MQTT_PERSISTENCE_MQTT_REDUNDANCY:
    help: Disable MQTT retained message redundancy for state persistence. When set, state is only persisted to disk.
  SIGENERGY2MQTT_PERSISTENCE_MQTT_STATE_PREFIX:
    help: 'MQTT topic prefix for persisted state messages (default: sigenergy2mqtt/_state)'
  SIGENERGY2MQTT_PERSISTENCE_SYNC_TIMEOUT:
    help: 'Timeout in seconds for synchronous persistence operations when called from a non-asyncio thread (default: 5.0, range: 0.1-30.0)'
  SIGENERGY2MQTT_PVOUTPUT_API_KEY:
    help: The API Key for PVOutput
  SIGENERGY2MQTT_PVOUTPUT_CONSUMPTION:
    help: Enable sending of consumption data to PVOutput. May be specified without a value (in which case defaults to 'consumption') or one of 'net-of-battery', 'consumption', or 'imported'. If not specified, no consumption data is sent.
  SIGENERGY2MQTT_PVOUTPUT_ENABLED:
    help: Enable uploading of data to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXPORTS:
    help: Enable sending of export data to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V10:
    help: A source used to populate the v10 extended field in PVOutput. You can specify a sensor class name, an entity id without the 'sensor.' prefix, a direct MQTT topic (or mqtt:<topic>), or a Home Assistant sensor entity id (sensor.<id> or ha:sensor.<id>, app only). If not specified, OR your donation status is not current, this field will not be sent to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V11:
    help: A source used to populate the v11 extended field in PVOutput. You can specify a sensor class name, an entity id without the 'sensor.' prefix, a direct MQTT topic (or mqtt:<topic>), or a Home Assistant sensor entity id (sensor.<id> or ha:sensor.<id>, app only). If not specified, OR your donation status is not current, this field will not be sent to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V12:
    help: A source used to populate the v12 extended field in PVOutput. You can specify a sensor class name, an entity id without the 'sensor.' prefix, a direct MQTT topic (or mqtt:<topic>), or a Home Assistant sensor entity id (sensor.<id> or ha:sensor.<id>, app only). If not specified, OR your donation status is not current, this field will not be sent to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V7:
    help: A source used to populate the v7 extended field in PVOutput. You can specify a sensor class name, an entity id without the 'sensor.' prefix, a direct MQTT topic (or mqtt:<topic>), or a Home Assistant sensor entity id (sensor.<id> or ha:sensor.<id>, app only). If not specified, OR your donation status is not current, this field will not be sent to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V8:
    help: A source used to populate the v8 extended field in PVOutput. You can specify a sensor class name, an entity id without the 'sensor.' prefix, a direct MQTT topic (or mqtt:<topic>), or a Home Assistant sensor entity id (sensor.<id> or ha:sensor.<id>, app only). If not specified, OR your donation status is not current, this field will not be sent to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V9:
    help: A source used to populate the v9 extended field in PVOutput. You can specify a sensor class name, an entity id without the 'sensor.' prefix, a direct MQTT topic (or mqtt:<topic>), or a Home Assistant sensor entity id (sensor.<id> or ha:sensor.<id>, app only). If not specified, OR your donation status is not current, this field will not be sent to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_IMPORTS:
    help: Enable sending of import data to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_LOG_LEVEL:
    help: 'Set the PVOutput log level. Valid values are: DEBUG, INFO, WARNING, ERROR or CRITICAL. Default is WARNING (warnings, errors and critical failures)'
  SIGENERGY2MQTT_PVOUTPUT_OUTPUT_HOUR:
    help: The hour of the day (20-23) at which the daily totals are sent to PVOutput. The default is 23 (11pm). Valid values are 20 to 23. The minute is randomly chosen between 56 and 59. If you specify -1, daily uploads will be sent at the same frequency as status updates.
  SIGENERGY2MQTT_PVOUTPUT_SYSTEM_ID:
    help: The PVOutput System ID
  SIGENERGY2MQTT_PVOUTPUT_TEMP_TOPIC:
    help: A source for the current temperature sent to PVOutput. You can specify a direct MQTT topic (or mqtt:<topic>), or a Home Assistant sensor entity id (sensor.<id> or ha:sensor.<id>, app only). If not specified, the temperature will not be sent to PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_UPLOAD_LOG_LEVEL:
    help: 'Set the log level for PVOutput upload log messages. Valid values are: DEBUG, INFO, WARNING, ERROR or CRITICAL. Default is INFO'
  SIGENERGY2MQTT_PVOUTPUT_VOLTAGE:
    help: "The source of the voltage value to be sent to PVOutput. Valid values are: phase-a, phase-b, phase-c, l/n-avg (line to neutral average), l/l-avg (line to line average) or pv (average across PV strings). If not specified, defaults to 'l/n-avg'."
  SIGENERGY2MQTT_REPEATED_STATE_PUBLISH_INTERVAL:
    help: "The interval in seconds at which repeated states are published. If < 0, repeated states are never published. If 0, repeated states are always published. If > 0, repeated states are published at the specified interval. The default is 0 (always publish)."
  SIGENERGY2MQTT_SANITY_CHECK_DEFAULT_KW:
    help: The default value in kW used for sanity checks to validate the maximum and minimum values for actual value of power sensors and the delta value of energy sensors. The default value is 500 kW per second, and readings outside the range are ignored.
  SIGENERGY2MQTT_SCAN_INTERVAL_HIGH:
    help: The scan interval in seconds for Modbus registers that are to be scanned at a high frequency. Default is 10 (seconds), and the minimum value is 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_LOW:
    help: The scan interval in seconds for Modbus registers that are to be scanned at a low frequency. Default is 600 (seconds), and the minimum value is 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_MEDIUM:
    help: The scan interval in seconds for Modbus registers that are to be scanned at a medium frequency. Default is 60 (seconds), and the minimum value is 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_REALTIME:
    help: The scan interval in seconds for Modbus registers that are to be scanned in near-real time. Default is 5 (seconds), and the minimum value is 1.
  clean:
    help: Publish empty discovery to delete existing devices, then exits immediately.
  discovery_only:
    help: Exit immediately after publishing discovery. Does not read values from the Modbus interface, except to probe for device configuration.
  show_version:
    help: Shows the version number, then exits immediately.
  validate_only:
    help: 'Validates the configuration and tests configured connections/authentication, then exits immediately. Optional mode: --validate=show_credentials logs the raw credentials used for connection tests.'
