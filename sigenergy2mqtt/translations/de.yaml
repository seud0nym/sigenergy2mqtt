class:
  ACCharger:
    name: Sigenergy AC-Ladegerät {sequence_suffix}
  ACChargerAlarm1:
    alarm:
      '0': Netz-Überspannung
      '1': Netz-Unterspannung
      '2': Überlast
      '3': Kurzschluss
      '4': Lade-Ausgangsstrom zu hoch
      '5': Fehlerstrom außerhalb der Grenzen
      '6': Erdungsfehler
      '7': Fehlerhafte Phasenfolge der Netzverkabelung
      '8': PEN-Fehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 1' # verify:ignore
  ACChargerAlarm2:
    alarm:
      '0': Fehler Fehlerstromerkennungsschaltung
      '1': Relais hängt
      '2': Pilotstromkreisfehler
      '3': Fehler Hilfsnetzteil
      '4': Elektrisches Schloss Fehler
      '5': Lampenpanel-Kommunikationsfehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 2' # verify:ignore
  ACChargerAlarm3:
    alarm:
      '0': Innentemperatur zu hoch
      '1': Ladekabelfehler
      '2': Zähler-Kommunikationsfehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 3' # verify:ignore
  ACChargerAlarms:
    attributes:
      source: Modbus-Register 32012-32014
      source_range: Modbus-Register {start}-{end}
    name: Alarme # verify:ignore
  ACChargerChargingPower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Ladeleistung
  ACChargerInputBreaker:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Eingangsschutzschalter
  ACChargerOutputCurrent:
    attributes:
      comment: "Bereich: [6, kleiner von 'AC-Ladegerät Nennstrom' und 'AC-Ladegerät Eingangsschutzschalter Nennstrom']"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Ausgangsstrom
  ACChargerRatedCurrent:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennstrom
  ACChargerRatedPower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennleistung
  ACChargerRatedVoltage:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennspannung
  ACChargerRunningState:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Betriebszustand
    options:
      "0": Initialisierung
      "1": EV nicht verbunden
      "2": Ladegerät und EV nicht bereit
      "3": Ladegerät bereit; EV nicht bereit
      "4": Ladegerät nicht bereit; EV bereit
      "5": Laden
      "6": Fehler
      "7": Störung
  ACChargerStatus:
    attributes:
      comment: 0:Start 1:Stopp
    name: AC-Ladegerät Start/Stopp
    name_off: Stoppen
    name_on: Starten
  ACChargerTotalEnergyConsumed:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamter Energieverbrauch
  AccumulatedChargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte Ladeenergie
  AccumulatedDischargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte Entladeenergie
  ActivePower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Wirkleistung
  ActivePowerFixedAdjustmentTargetValue:
    attributes:
      comment: Remote EMS muss aktiviert sein und das EMS muss sich im PCS-Fernsteuerungsmodus befinden, damit dieses Register wirksam wird.
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Zielwert Wirkleistung Festwertanpassung
  ActivePowerPercentageAdjustmentTargetValue:
    attributes:
      comment: "Bereich: [-100,00,100,00]. Remote EMS muss aktiviert sein und das EMS muss sich im PCS-Fernsteuerungsmodus befinden, damit dieses Register wirksam wird."
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Zielwert Wirkleistung Prozentanpassung
  ActivePowerRegulationGradient:
    attributes:
      comment: "Bereich: [0, 5000]. Prozent der Nennleistung angepasst pro Sekunde"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Wirkleistungsregelungsgradient
  Alarm1Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Niedriger Isolationswiderstand
      '2': Übertemperatur
      '3': Gerätefehler
      '4': Systemerdungsfehler
      '5': PV-String-Überspannung
      '6': PV-String umgekehrt angeschlossen
      '7': PV-String-Rückspeisung
      '8': AFCI-Fehler
      '9': Netzausfall
      '10': Netz-Überspannung
      '11': Netz-Unterspannung
      '12': Netz-Überfrequenz
      '13': Netz-Unterfrequenz
      '14': Netzspannungsungleichgewicht
      '15': Gleichstromkomponente des Ausgangsstroms außerhalb der Grenzen
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: STK
  Alarm2Sensor:
    alarm:
      '0': Fehlerstrom außerhalb der Grenzen
      '1': Kommunikation abnormal
      '2': Systemeigener Schutz
      '3': AFCI-Selbstprüfungsschaltungsdefekt
      '4': Netzunabhängiger Schutz
      '5': Manueller Betriebsschutz
      '7': Abnormale Phasenfolge
      '8': Kurzschluss zu PE
      '9': Sanftanlauf fehlgeschlagen
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: STK
  Alarm3Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Niedriger Isolationswiderstand gegen Erde
      '2': Temperatur zu hoch
      '3': Gerätefehler
      '4': Untertemperatur
      '5': Interner Schutz
      '6': Thermisches Durchgehen
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: ESS  # verify:ignore
  Alarm4Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Temperatur zu hoch
      '2': Gerätefehler
      '3': Übermäßiger Fehlerstrom im Inselbetrieb-Ausgang
      '4': N-Leiter-Erdungsfehler
      '5': Fehlerhafte Phasenfolge der Netzverkabelung
      '6': Fehlerhafte Phasenfolge der Wechselrichterverkabelung
      '7': Netzphasenverlust
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: GW  # verify:ignore
  Alarm5Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Niedriger Isolationswiderstand gegen Erde
      '2': Übertemperatur
      '3': Gerätefehler
      '4': Ladefehler
      '5': Geräteschutz
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: EVDC  # verify:ignore
  Alarm6:
    alarm:
      '0': Gateway-Kommunikation abnormal
      '1': Zähler-Kommunikation abnormal
      '2': AC-Leistungssensor-Kommunikation abnormal
      '6': Hardwareschutz bei Überschreitung der Netzeinspeiseleistungsgrenze
      '8': Generator-Startfehler
      '10': CLS-Fehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 6' # verify:ignore
  Alarm7:
    alarm:
      '0': OVGR-Fehler
      '1': RPR-Fehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 7' # verify:ignore
  AlarmCombinedSensor:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Hybrid-Wechselrichter
  AlarmSensor:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    no_alarm: Kein Alarm
    unknown_alarm: Unbekannt (bit{bit}∈{value})
  AvailableBatteryChargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Ladeenergie
  AvailableBatteryDischargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Entladeenergie
  AvailableMaxActivePower:
    attributes:
      comment: Einspeisung am AC-Anschluss. Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Wirkleistung
  AvailableMaxChargingCapacity:
    attributes:
      comment: Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Ladekapazität
  AvailableMaxChargingPower:
    attributes:
      comment: Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Ladeleistung
  AvailableMaxDischargingCapacity:
    attributes:
      comment: Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Entladekapazität
  AvailableMaxDischargingPower:
    attributes:
      comment: Bezug am AC-Anschluss. Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Entladeleistung
  AvailableMaxReactivePower:
    attributes:
      comment: Einspeisung am AC-Anschluss. Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Blindleistung
  AvailableMinActivePower:
    attributes:
      comment: Bezug am AC-Anschluss. Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Min. Wirkleistung
  AvailableMinReactivePower:
    attributes:
      comment: Bezug am AC-Anschluss. Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Min. Blindleistung
  AverageCellTemperature:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Durchschnittliche Zellentemperatur
  AverageCellVoltage:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Durchschnittliche Zellenspannung
  BatteryChargingPower:
    attributes:
      source: BatteryPower > 0 #verify:ignore
    name: Batterieladeleistung
  BatteryDischargingPower:
    attributes:
      source: BatteryPower < 0 × -1 #verify:ignore
    name: Batterieentladeleistung
  BatteryPower:
    attributes:
      comment: "ESS-Leistung: <0 = Entladen, >0 = Laden"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Batterieleistung
  ChargeCutOffSoC:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Ladungsabschalt-Ladezustand
  ChargeDischargePower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Batterieleistung
  CurrentControlCommandValue:
    attributes:
      comment: Verwendung der Fernausgangssteuerung in Japan
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Aktueller Steuerbefehlswert
  DCCharger:
    name: Sigenergy DC-Ladegerät {sequence_suffix}
  DCChargerCurrentChargingCapacity:
    attributes:
      comment: Einzelvorgang
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Aktuelle Ladekapazität
  DCChargerCurrentChargingDuration:
    attributes:
      comment: Einzelvorgang
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Aktuelle Ladedauer
  DCChargerCurrentDischargingCapacity:
    attributes:
      comment: Einmalig
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Aktuelle Entladekapazität
  DCChargerCurrentDischargingDuration:
    attributes:
      comment: Einmalig
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Aktuelle Entladedauer
  DCChargerDischargingCurrent:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Entladestrom
  DCChargerMaxChargingPowerLimit:
    attributes:
      comment: Maximale Ladeleistungsgrenze des DC-Ladegeräts
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Maximale Ladeleistungsgrenze
  DCChargerMaxDischargingPowerLimit:
    attributes:
      comment: Maximale Entladeleistungsgrenze des DC-Ladegeräts
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Maximale Entladeleistungsgrenze
  DCChargerOutputPower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Ausgangsleistung
  DCChargerRatedChargingPower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennladeleistung
  DCChargerRatedDischargingPower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennentladeleistung
  DCChargerRunningState:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Betriebszustand
    options:
      "0": Leerlauf
      "1": Belegt (Ladestecker eingesteckt aber nicht erkannt)
      "2": Vorbereitung (Kommunikation wird hergestellt)
      "3": Laden
      "4": Fehler
      "5": Geplant
  DCChargerStatus:
    attributes:
      comment: 0:Start 1:Stopp
    name: DC-Ladegerät Start/Stopp
    name_off: Stoppen
    name_on: Starten
  DCChargerTotalChargingCapacity:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamtladekapazität
  DCChargerTotalDischargingCapacity:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamtentladekapazität
  DCChargerVehicleBatteryVoltage:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Fahrzeugbatteriespannung
  DCChargerVehicleChargingCurrent:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Fahrzeugladestrom
  DCChargerVehicleSoC:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Fahrzeug-Ladezustand
  DailyChargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Tägliche Ladeenergie
  DailyDischargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Tägliche Entladeenergie
  DischargeCutOffSoC:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Entladungsabschalt-Ladezustand
  DistributionCabinet:
    name: '{model_id} {serial} Verteilerschrank'
  EMSWorkMode:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: EMS-Betriebsmodus
    options:
      "0": Max. Eigenverbrauch
      "1": Sigen-KI
      "2": Zeitabhängiger Tarif
      "5": Vollständige Netzeinspeisung
      "6": VPP-Planung
      "7": Fern-EMS
      "9": Zeitbasierte Steuerung
  ESS:
    name: '{model_id} {serial_number} Energiespeichersystem'
  ESSAverageCellTemperature:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Durchschnittliche Zelltemperatur
  ESSBackupSOC:
    attributes:
      comment: "Bereich: [0,00, 100,00]"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Backup-Ladezustand
  ESSChargeCutOffSOC:
    attributes:
      comment: "Bereich: [0,00, 100,00]"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Ladungsabschalt-Ladezustand
  ESSDischargeCutOffSOC:
    attributes:
      comment: "Bereich: [0,00, 100,00]"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Entladungsabschalt-Ladezustand
  ESSPreHeating:
    name: Sigenergy Plant ESS Vorwärmung {plant_suffix}
  ESSPreHeatingAdvanceEnable:
    attributes:
      comment: '0: Deaktivieren, 1: Aktivieren. Wird wirksam, wenn der Vorheizmodus auf „Manuell“ eingestellt ist.'
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Vorheizen
  ESSPreHeatingEnable:
    attributes:
      comment: '0: Deaktivieren, 1: Aktivieren'
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Vorheizen
  ESSPreHeatingMode:
    attributes:
      comment: '0: Automatisch, 1: Manuell'
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Vorheizmodus
    options:
      '0': Automatisch
      '1': Handbuch
  ESSPreHeatingReservedSOC:
    attributes:
      comment: 'Bereich: [0,00,100,00]'
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Vorheizen des reservierten SoC
  ESSPreHeatingTOUTargetPower:
    attributes:
      comment: '<0: Entladen, >0: Laden'
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: TOU {slot} Ziel-Lade-/Entladeleistung
  ESSPreHeatingTOUTime:
    attributes:
      comment: Epochensekunden mit Zeitzone; Die Interpretation der Ortszeit hängt vom Gerät ab.
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Hybrid-Wechselrichter
  ESSPreHeatingTOUTimeEnd:
    attributes:
      comment: Epochensekunden mit Zeitzone; Die Interpretation der Ortszeit hängt vom Gerät ab.
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: TOU {slot} Ende
  ESSPreHeatingTOUTimeStart:
    attributes:
      comment: Epochensekunden mit Zeitzone; Die Interpretation der Ortszeit hängt vom Gerät ab.
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: TOU {slot} Start  # verify:ignore
