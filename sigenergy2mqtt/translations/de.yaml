    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte Ladeenergie
  ESSTotalDischargedEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte Entladeenergie
  EVDCTotalChargedEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte DC-EV-Ladeenergie
  EVDCTotalDischargedEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte DC-EV-Entladeenergie
