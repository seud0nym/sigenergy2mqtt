cli:
  SIGENERGY2MQTT_CONFIG:
    help: 'Der Pfad zur YAML-Konfigurationsdatei (Standard: SIGENERGY2MQTT_CONFIG-Umgebungsvariable, andernfalls /etc/sigenergy2mqtt.yaml)'
  SIGENERGY2MQTT_CONSUMPTION:
    help: "Methode zur Berechnung des Anlagenverbrauchsleistungssensors festlegen. Gültige Werte sind: 'calculated', 'total' (Gesamtlastleistungsregister) oder 'general' (V2.8 Allgemeine Lastleistungsregister). Standard ist 'calculated'. Diese Option wird bei Firmware vor Modbus-Protokoll V2.8 ignoriert."
  SIGENERGY2MQTT_DEBUG_SENSOR:
    help: Einen Sensor zum Debuggen angeben, entweder über die vollständige oder teilweise Entity-ID oder den Sensorklassennamen (z.B. die Angabe von 'daily' würde alle Sensoren mit 'daily' im Namen erfassen), oder einen regulären Ausdruck zum Abgleich mit der Entity-ID oder dem Klassennamen (z.B. '^PowerFactor$' erfasst nur diesen einen Klassennamen). Bei Angabe wird --log-level auf DEBUG gesetzt.
  SIGENERGY2MQTT_HASS_DEVICE_NAME_PREFIX:
    help: "Das Präfix für Home Assistant Entity-Namen. Beispiel: Ein Präfix 'prefix' stellt 'prefix ' den Namen voran (Standard: '')"
  SIGENERGY2MQTT_HASS_DISCOVERY_PREFIX:
    help: 'Das Home Assistant MQTT Discovery Topic-Präfix (Standard: homeassistant)'
  SIGENERGY2MQTT_HASS_EDIT_PCT_BOX:
    help: Bei Bearbeitung von Prozentsensoren ein numerisches Eingabefeld verwenden (true) oder einen Schieberegler verwenden (false).
  SIGENERGY2MQTT_HASS_ENABLED:
    help: Auto-Discovery in Home Assistant aktivieren.
  SIGENERGY2MQTT_HASS_ENTITY_ID_PREFIX:
    help: "Das Präfix für Home Assistant Entity-IDs. Beispiel: Ein Präfix 'prefix' stellt 'prefix_' den Entity-IDs voran (Standard: sigen)"
  SIGENERGY2MQTT_HASS_SIGENERGY_LOCAL_MODBUS_NAMING:
    help: Sigenergy-Local-Modbus-Entity-ID-, Verstärkungs- und Einheit-Zuordnungen für kompatible Sensoren verwenden.
  SIGENERGY2MQTT_HASS_UNIQUE_ID_PREFIX:
    help: "Das Präfix für Home Assistant Unique-IDs. Beispiel: Ein Präfix 'prefix' stellt 'prefix_' den Unique-IDs voran (Standard: sigen). Einmal festgelegt, sollte dies NIE geändert werden, da es bestehende Entitäten in Home Assistant beschädigt."
  SIGENERGY2MQTT_HASS_USE_SIMPLIFIED_TOPICS:
    help: Vereinfachte Topic-Struktur aktivieren (sigenergy2mqtt/object_id/state) anstelle der vollständigen Home Assistant Topic-Struktur (homeassistant/platform/device_id/object_id/state)
  SIGENERGY2MQTT_INFLUX_BATCH_SIZE:
    help: 'InfluxDB-Batch-Größe (Standard: 100)'
  SIGENERGY2MQTT_INFLUX_BUCKET:
    help: InfluxDB v2-Bucket-Name (Standardwert ist --influxdb-database, falls nicht festgelegt)
  SIGENERGY2MQTT_INFLUX_DATABASE:
    help: 'InfluxDB-Datenbank zum Schreiben von Metriken (Standard: sigenergy)'
  SIGENERGY2MQTT_INFLUX_DEFAULT_MEASUREMENT:
    help: 'Der Standard-Messname für InfluxDB-Updates, falls ein Sensor keine Maßeinheit definiert hat (Standard: state)'
  SIGENERGY2MQTT_INFLUX_ENABLED:
    help: Schreiben von Metriken in InfluxDB aktivieren.
  SIGENERGY2MQTT_INFLUX_EXCLUDE:
    help: Liste der auszuschließenden Sensor-IDs (durch Leerzeichen getrennt)
  SIGENERGY2MQTT_INFLUX_FLUSH_INTERVAL:
    help: 'InfluxDB-Flush-Intervall in Sekunden (Standard: 1.0)'
  SIGENERGY2MQTT_INFLUX_HOST:
    help: 'InfluxDB-Hostname oder IP-Adresse (Standard: 127.0.0.1)'
  SIGENERGY2MQTT_INFLUX_INCLUDE:
    help: Liste der einzuschließenden Sensor-IDs (durch Leerzeichen getrennt)
  SIGENERGY2MQTT_INFLUX_LOAD_HASS_HISTORY:
    help: Geben Sie an, historische Daten aus der Home Assistant InfluxDB-Datenbank zu laden. Dies funktioniert nur, wenn sigenergy2mqtt so konfiguriert ist, dass derselbe InfluxDB-Server wie Home Assistant mit denselben Anmeldeinformationen verwendet wird.
  SIGENERGY2MQTT_INFLUX_LOG_LEVEL:
    help: 'InfluxDB-Subsystem-Protokollebene. Gültige Werte sind: DEBUG, INFO, WARNING, ERROR oder CRITICAL. Standard ist WARNING (Warnungen, Fehler und kritische Ausfälle)'
  SIGENERGY2MQTT_INFLUX_MAX_RETRIES:
    help: 'Maximale InfluxDB-Wiederholungsversuche (Standard: 3)'
  SIGENERGY2MQTT_INFLUX_MAX_SYNC_WORKERS:
    help: 'Maximale InfluxDB-Sync-Worker (Standard: 4)'
  SIGENERGY2MQTT_INFLUX_ORG:
    help: InfluxDB-Organisationsname oder -ID
  SIGENERGY2MQTT_INFLUX_PASSWORD:
    help: InfluxDB-Passwort
  SIGENERGY2MQTT_INFLUX_POOL_CONNECTIONS:
    help: 'InfluxDB-Verbindungspoolgröße (Standard: 100)'
  SIGENERGY2MQTT_INFLUX_POOL_MAXSIZE:
    help: 'Maximale InfluxDB-Verbindungspoolgröße (Standard: 100)'
  SIGENERGY2MQTT_INFLUX_PORT:
    help: 'InfluxDB-Port (Standard: 8086)'
  SIGENERGY2MQTT_INFLUX_QUERY_INTERVAL:
    help: 'InfluxDB-Abfrageintervall in Sekunden (Standard: 0.5)'
  SIGENERGY2MQTT_INFLUX_READ_TIMEOUT:
    help: 'InfluxDB-Lese-Zeitüberschreitung in Sekunden (Standard: 120.0)'
  SIGENERGY2MQTT_INFLUX_SYNC_CHUNK_SIZE:
    help: 'InfluxDB-Sync-Chunk-Größe (Standard: 1000)'
  SIGENERGY2MQTT_INFLUX_TOKEN:
    help: InfluxDB v2-Authentifizierungstoken (bevorzugt v2-APIs, falls angegeben)
  SIGENERGY2MQTT_INFLUX_USERNAME:
    help: InfluxDB-Benutzername
  SIGENERGY2MQTT_INFLUX_WRITE_TIMEOUT:
    help: 'InfluxDB-Schreib-Zeitüberschreitung in Sekunden (Standard: 30.0)'
  SIGENERGY2MQTT_LANGUAGE:
    help: 'Legen Sie die Sprache für Übersetzungen fest. Der Standardwert wird vom System ermittelt (z. B. LANG-Umgebungsvariable) oder Englisch, falls keine Alternative gefunden wird.'
  SIGENERGY2MQTT_LOG_FMT:
    help: 'Legen Sie das Log-Format fest. Der Standardwert hängt von der Laufzeitumgebung ab.'
  SIGENERGY2MQTT_LOG_LEVEL:
    help: 'Protokollebene festlegen. Gültige Werte sind: DEBUG, INFO, WARNING, ERROR oder CRITICAL. Standard ist WARNING (Warnungen, Fehler und kritische Ausfälle)'
  SIGENERGY2MQTT_MODBUS_ACCHARGER_DEVICE_ID:
    help: Die Sigenergy-AC-Ladegerät-Modbus-Geräte-ID. Mehrere Geräte-IDs können durch Kommas getrennt angegeben werden.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY:
    help: Automatische Erkennung von Sigenergy Modbus-Hosts und Geräte-IDs versuchen. Bei 'once' erfolgt die Auto-Erkennung nur, wenn keine vorhandenen Ergebnisse gefunden werden. Bei 'force' werden zuvor erkannte Modbus-Hosts und Geräte-IDs überschrieben. Ohne Angabe ist die Auto-Erkennung deaktiviert.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_EXCLUDE:
    help: Eine durch Kommas getrennte Liste von Geräteklassennamen, die von der automatischen Erkennung ausgeschlossen werden sollen. Die Standardeinstellung ist „PID,PSS“.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_MAX_DEVICE_ID:
    help: Die maximale Geräte-ID, die bei der automatischen Erkennung von Sigenergy-Geräten im Netzwerk verwendet werden soll. Der Standardwert ist 10 und muss zwischen 1 und 246 (einschließlich) liegen.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_NETWORKS:
    help: Eine durch Kommas getrennte Liste von IPv4-Netzwerken in CIDR-Notation, die bei der automatischen Erkennung gescannt werden sollen (z. B. '192.168.1.0/24,10.0.0.0/24'). Verwenden Sie dies, um Netzwerke zu scannen, die über Routing zugänglich sind, aber nicht direkt an eine Netzwerkschnittstelle angeschlossen sind.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_PING_TIMEOUT:
    help: Der Ping-Timeout in Sekunden für die automatische Erkennung von Sigenergy-Geräten im Netzwerk. Standard ist 0,5 Sekunden.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_RETRIES:
    help: Die maximale Anzahl von Modbus-Wiederholungsversuchen für die automatische Erkennung von Sigenergy-Geräten im Netzwerk. Standard ist 0.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_TIMEOUT:
    help: Der Modbus-Timeout in Sekunden für die automatische Erkennung von Sigenergy-Geräten im Netzwerk. Standard ist 0,25 Sekunden.
  SIGENERGY2MQTT_MODBUS_DCCHARGER_DEVICE_ID:
    help: Die Sigenergy-DC-Ladegerät-Modbus-Geräte-ID. Mehrere Geräte-IDs können durch Kommas getrennt angegeben werden.
  SIGENERGY2MQTT_MODBUS_DISABLE_CHUNKING:
    help: Modbus-Chunking beim Lesen von Registern deaktivieren und jedes Register einzeln lesen.
  SIGENERGY2MQTT_MODBUS_HOST:
    help: Der Hostname oder die IP-Adresse des Sigenergy-Geräts
  SIGENERGY2MQTT_MODBUS_INVERTER_DEVICE_ID:
    help: Die Sigenergy-Wechselrichter-Modbus-Geräte-ID. Mehrere Geräte-IDs können durch Kommas getrennt angegeben werden.
  SIGENERGY2MQTT_MODBUS_LOG_LEVEL:
    help: 'pymodbus-Protokollebene festlegen. Gültige Werte sind: DEBUG, INFO, WARNING, ERROR oder CRITICAL. Standard ist WARNING (Warnungen, Fehler und kritische Ausfälle)'
  SIGENERGY2MQTT_MODBUS_LOG_SKIPPED:
    help: Übersprungene Modbus-Anfragen protokollieren.
  SIGENERGY2MQTT_MODBUS_NO_REMOTE_EMS:
    help: Keine Lese-/Schreib-Sensoren für die Fern-Energiemanagementsystem (EMS)-Integration an MQTT veröffentlichen. Wird ignoriert, wenn --modbus-read-only angegeben ist.
  SIGENERGY2MQTT_MODBUS_PID_DEVICE_ID:
    help: Die Sigenergy PID Modbus-Geräte-ID. Es können mehrere Geräte-IDS angegeben werden, getrennt durch Kommas.
  SIGENERGY2MQTT_MODBUS_PORT:
    help: 'Die Modbus-Portnummer des Sigenergy-Geräts (Standard: 502)'
  SIGENERGY2MQTT_MODBUS_PSS_DEVICE_ID:
    help: Die Sigenergy PSS Modbus-Geräte-ID. Es können mehrere Geräte-IDS angegeben werden, getrennt durch Kommas.
  SIGENERGY2MQTT_MODBUS_READ_ONLY:
    help: Nur Nur-Lesen-Sensoren an MQTT veröffentlichen. Weder Lese-/Schreibsensoren noch Nur-Schreiben-Sensoren werden bei Angabe veröffentlicht.
  SIGENERGY2MQTT_MODBUS_RETRIES:
    help: Die maximale Anzahl von Wiederholungsversuchen für eine Modbus-Operation bei Fehlschlag. Standard ist 3.
  SIGENERGY2MQTT_MODBUS_TIMEOUT:
    help: Der Timeout für Verbindung und Empfang von Modbus-Daten in Sekunden (Dezimalzahlen für Millisekunden verwenden). Standard ist 1,0.
  SIGENERGY2MQTT_MQTT_ANONYMOUS:
    help: Anonyme Verbindung zum MQTT-Broker erlauben (ohne Benutzername/Passwort). Bei Angabe werden --mqtt-username und --mqtt-password ignoriert.
  SIGENERGY2MQTT_MQTT_BROKER:
    help: 'Der Hostname oder die IP-Adresse eines MQTT-Brokers (Standard: 127.0.0.1)'
  SIGENERGY2MQTT_MQTT_KEEPALIVE:
    help: Die maximale Zeit in Sekunden zwischen Kommunikationen mit dem Broker. Wenn keine anderen Nachrichten ausgetauscht werden, steuert dies die Rate, mit der der Client Ping-Nachrichten an den Broker sendet. Standard ist 60, Minimum ist 1.
  SIGENERGY2MQTT_MQTT_LOG_LEVEL:
    help: 'paho.mqtt-Protokollebene festlegen. Gültige Werte sind: DEBUG, INFO, WARNING, ERROR oder CRITICAL. Standard ist WARNING (Warnungen, Fehler und kritische Ausfälle)'
  SIGENERGY2MQTT_MQTT_PASSWORD:
    help: Ein gültiges Passwort für den MQTT-Broker-Benutzernamen
  SIGENERGY2MQTT_MQTT_PORT:
    help: Der Port des MQTT-Brokers (Standard ist 1883, außer --mqtt-tls ist angegeben, dann ist der Standard 8883)
  SIGENERGY2MQTT_MQTT_TLS:
    help: Sichere Kommunikation zum MQTT-Broker über TLS/SSL aktivieren. Bei Angabe ist der Standard-MQTT-Port 8883.
  SIGENERGY2MQTT_MQTT_TLS_INSECURE:
    help: Unsichere Kommunikation über TLS aktivieren. Bei selbstsignierten Zertifikaten des Brokers muss diese Option angegeben werden. Wird ignoriert, wenn --mqtt-tls nicht angegeben ist.
  SIGENERGY2MQTT_MQTT_TRANSPORT:
    help: MQTT-Transportmechanismus festlegen. Muss websockets oder tcp sein. Standard ist tcp.
  SIGENERGY2MQTT_MQTT_USERNAME:
    help: Ein gültiger Benutzername für den MQTT-Broker
  SIGENERGY2MQTT_NO_EMS_MODE_CHECK:
    help: Validierung deaktivieren, die ESS Max Lade-/Entladeleistung und PV Max Leistungsgrenzen deaktiviert, wenn der Fern-EMS-Steuerungsmodus nicht auf Befehlsladung/-entladung eingestellt ist.
  SIGENERGY2MQTT_NO_METRICS:
    help: Keine sigenergy2mqtt-Metriken veröffentlichen.
  SIGENERGY2MQTT_PERSISTENCE_CACHE_WARMUP_TIMEOUT:
    help: 'Maximale Sekunden zum Warten auf den im MQTT gespeicherten Zustand während des Start-Cache-Aufwärmens (Standard: 10.0, Bereich: 1-60)'
  SIGENERGY2MQTT_PERSISTENCE_DEBUG:
    help: Aktivieren Sie die Debug-Protokollierung für alle Vorgänge des Zustandsspeichers (Persistenz).
  SIGENERGY2MQTT_PERSISTENCE_MQTT_REDUNDANCY:
    help: 'MQTT-Redundanz für gespeicherte Nachrichten zur Zustandspersistenz deaktivieren. Wenn gesetzt, wird der Zustand nur auf der Festplatte gespeichert.'
  SIGENERGY2MQTT_PERSISTENCE_MQTT_STATE_PREFIX:
    help: 'MQTT-Topic-Präfix für persistierte Zustandsmeldungen (Standard: sigenergy2mqtt/_state)'
  SIGENERGY2MQTT_PERSISTENCE_SYNC_TIMEOUT:
    help: 'Zeitüberschreitung in Sekunden für synchrone Persistenzoperationen, wenn sie von einem Nicht-Asyncio-Thread aufgerufen werden (Standard: 5.0, Bereich: 0.1-30.0)'
  SIGENERGY2MQTT_PVOUTPUT_API_KEY:
    help: Der API-Schlüssel für PVOutput
  SIGENERGY2MQTT_PVOUTPUT_CONSUMPTION:
    help: Verbrauchsdaten an PVOutput senden aktivieren. Kann ohne Wert angegeben werden (Standard ist dann 'consumption') oder als 'net-of-battery', 'consumption' oder 'imported'. Ohne Angabe werden keine Verbrauchsdaten gesendet.
  SIGENERGY2MQTT_PVOUTPUT_ENABLED:
    help: Statusaktualisierungen an PVOutput aktivieren.
  SIGENERGY2MQTT_PVOUTPUT_EXPORTS:
    help: Exportdaten an PVOutput senden aktivieren.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V10:
    help: "Eine Quelle zum Befüllen des erweiterten Felds v10 in PVOutput. Du kannst einen Sensorklassennamen, eine Entitäts-ID ohne das Präfix 'sensor.', ein direktes MQTT-Topic (oder mqtt:<topic>) oder eine Home-Assistant-Sensor-Entitäts-ID (sensor.<id> oder ha:sensor.<id>, nur App) angeben. Wenn nicht angegeben ODER dein Spendenstatus nicht aktuell ist, wird dieses Feld nicht an PVOutput gesendet."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V11:
    help: "Eine Quelle zum Befüllen des erweiterten Felds v11 in PVOutput. Du kannst einen Sensorklassennamen, eine Entitäts-ID ohne das Präfix 'sensor.', ein direktes MQTT-Topic (oder mqtt:<topic>) oder eine Home-Assistant-Sensor-Entitäts-ID (sensor.<id> oder ha:sensor.<id>, nur App) angeben. Wenn nicht angegeben ODER dein Spendenstatus nicht aktuell ist, wird dieses Feld nicht an PVOutput gesendet."
