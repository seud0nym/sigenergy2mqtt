  AlarmSensor:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    no_alarm: Kein Alarm
    unknown_alarm: Unbekannt (bit{bit}∈{value})
  AvailableBatteryChargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Ladeenergie
  AvailableBatteryDischargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Entladeenergie
  AvailableMaxActivePower:
    attributes:
      comment: Einspeisung am AC-Anschluss. Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Wirkleistung
  AvailableMaxChargingCapacity:
    attributes:
      comment: Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Ladekapazität
  AvailableMaxChargingPower:
    attributes:
      comment: Nur laufende Wechselrichter gezählt
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Verfügbare Max. Ladeleistung
  AvailableMaxDischargingCapacity:
    attributes:
