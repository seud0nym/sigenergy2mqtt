class:
  ACCharger:
    name: Sigenergy AC-Ladegerät {sequence_suffix}
  ACChargerAlarm1:
    alarm:
      '0': Netz-Überspannung
      '1': Netz-Unterspannung
      '2': Überlast
      '3': Kurzschluss
      '4': Lade-Ausgangsstrom zu hoch
      '5': Fehlerstrom außerhalb der Grenzen
      '6': Erdungsfehler
      '7': Fehlerhafte Phasenfolge der Netzverkabelung
      '8': PEN-Fehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 1' # verify:ignore
  ACChargerAlarm2:
    alarm:
      '0': Fehler Fehlerstromerkennungsschaltung
      '1': Relais hängt
      '2': Pilotstromkreisfehler
      '3': Fehler Hilfsnetzteil
      '4': Elektrisches Schloss Fehler
      '5': Lampenpanel-Kommunikationsfehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 2' # verify:ignore
  ACChargerAlarm3:
    alarm:
      '0': Innentemperatur zu hoch
      '1': Ladekabelfehler
      '2': Zähler-Kommunikationsfehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 3' # verify:ignore
  ACChargerAlarms:
    attributes:
      source: Modbus-Register 32012-32014
      source_range: Modbus-Register {start}-{end}
    name: Alarme # verify:ignore
  ACChargerChargingPower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Ladeleistung
  ACChargerInputBreaker:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Eingangsschutzschalter
  ACChargerOutputCurrent:
    attributes:
      comment: "Bereich: [6, kleiner von 'AC-Ladegerät Nennstrom' und 'AC-Ladegerät Eingangsschutzschalter Nennstrom']"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Ausgangsstrom
  ACChargerRatedCurrent:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennstrom
  ACChargerRatedPower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennleistung
  ACChargerRatedVoltage:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Nennspannung
  ACChargerRunningState:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Betriebszustand
    options:
      "0": Initialisierung
      "1": EV nicht verbunden
      "2": Ladegerät und EV nicht bereit
      "3": Ladegerät bereit; EV nicht bereit
      "4": Ladegerät nicht bereit; EV bereit
      "5": Laden
      "6": Fehler
      "7": Störung
  ACChargerStatus:
    attributes:
      comment: 0:Start 1:Stopp
    name: AC-Ladegerät Start/Stopp
    name_off: Stoppen
    name_on: Starten
  ACChargerTotalEnergyConsumed:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamter Energieverbrauch
  AccumulatedChargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte Ladeenergie
  AccumulatedDischargeEnergy:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Gesamte Entladeenergie
  ActivePower:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Wirkleistung
  ActivePowerFixedAdjustmentTargetValue:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Zielwert Wirkleistung Festwertanpassung
  ActivePowerPercentageAdjustmentTargetValue:
    attributes:
      comment: "Bereich: [-100,00, 100,00]"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Zielwert Wirkleistung Prozentanpassung
  ActivePowerRegulationGradient:
    attributes:
      comment: "Bereich: [0, 5000]. Prozent der Nennleistung angepasst pro Sekunde"
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: Wirkleistungsregelungsgradient
  Alarm1Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Niedriger Isolationswiderstand
      '2': Übertemperatur
      '3': Gerätefehler
      '4': Systemerdungsfehler
      '5': PV-String-Überspannung
      '6': PV-String umgekehrt angeschlossen
      '7': PV-String-Rückspeisung
      '8': AFCI-Fehler
      '9': Netzausfall
      '10': Netz-Überspannung
      '11': Netz-Unterspannung
      '12': Netz-Überfrequenz
      '13': Netz-Unterfrequenz
      '14': Netzspannungsungleichgewicht
      '15': Gleichstromkomponente des Ausgangsstroms außerhalb der Grenzen
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
  Alarm2Sensor:
    alarm:
      '0': Fehlerstrom außerhalb der Grenzen
      '1': Kommunikation abnormal
      '2': Systemeigener Schutz
      '3': AFCI-Selbstprüfungsschaltungsdefekt
      '4': Netzunabhängiger Schutz
      '5': Manueller Betriebsschutz
      '7': Abnormale Phasenfolge
      '8': Kurzschluss zu PE
      '9': Sanftanlauf fehlgeschlagen
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
  Alarm3Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Niedriger Isolationswiderstand gegen Erde
      '2': Temperatur zu hoch
      '3': Gerätefehler
      '4': Untertemperatur
      '5': Interner Schutz
      '6': Thermisches Durchgehen
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
  Alarm4Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Temperatur zu hoch
      '2': Gerätefehler
      '3': Übermäßiger Fehlerstrom im Inselbetrieb-Ausgang
      '4': N-Leiter-Erdungsfehler
      '5': Fehlerhafte Phasenfolge der Netzverkabelung
      '6': Fehlerhafte Phasenfolge der Wechselrichterverkabelung
      '7': Netzphasenverlust
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
  Alarm5Sensor:
    alarm:
      '0': Softwareversionskonflikt
      '1': Niedriger Isolationswiderstand gegen Erde
      '2': Übertemperatur
      '3': Gerätefehler
      '4': Ladefehler
      '5': Geräteschutz
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
  Alarm6:
    alarm:
      '0': Gateway-Kommunikation abnormal
      '1': Zähler-Kommunikation abnormal
      '2': AC-Leistungssensor-Kommunikation abnormal
      '6': Hardwareschutz bei Überschreitung der Netzeinspeiseleistungsgrenze
      '8': Generator-Startfehler
      '10': CLS-Fehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 6' # verify:ignore
  Alarm7:
    alarm:
      '0': OVGR-Fehler
      '1': RPR-Fehler
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
    name: 'Alarm 7' # verify:ignore
  AlarmCombinedSensor:
    attributes:
      source: Modbus-Register {address}
      source_range: Modbus-Register {start}-{end}
