      comment: 'Al vender electricidad en el punto de conexión a la red, se debe controlar el factor de potencia al valor configurado en este sensor. Rango: [(-1,0, -0,8) U (0,8, 1,0)]. Se necesita sensor de red.'
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Valor objetivo de ajuste del factor de potencia de PCC (exportación de red)
  PCCPowerFactorAdjustmentTargetValueGridImport:
    attributes:
      comment: 'Al comprar electricidad en el punto de conexión a la red, se debe controlar el factor de potencia al valor configurado en este sensor. Rango: [(-1,0, -0,8) U (0,8, 1,0)]. Se necesita sensor de red.'
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Valor objetivo de ajuste del factor de potencia del PCC (importación de red)
  PCSMaxExportLimit:
    attributes:
      comment: "La potencia activa máxima del inversor en la planta no debe superar el valor configurado en este sensor. Rango:[0, 0xFFFFFFFE]。Con valor 0xFFFFFFFF, el registro no es válido. En todos los demás casos, tiene efecto a nivel mundial."
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Límite Máx de Exportación PCS
  PCSMaxImportLimit:
    attributes:
      comment: "La potencia máxima activa absorbida del inversor en la planta no debe superar el valor configurado en este sensor. Rango:[0, 0xFFFFFFFE]。Con valor 0xFFFFFFFF, el registro no es válido. En todos los demás casos, tiene efecto a nivel mundial."
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Límite Máx de Importación PCS
