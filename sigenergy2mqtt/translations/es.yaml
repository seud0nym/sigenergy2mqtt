class:
  ACCharger:
    name: Cargador CA Sigenergy {sequence_suffix}
  ACChargerAlarm1:
    alarm:
      '0': Sobretensión de red
      '1': Subtensión de red
      '2': Sobrecarga
      '3': Cortocircuito
      '4': Sobrecorriente de salida de carga
      '5': Corriente de fuga fuera de límite
      '6': Fallo de conexión a tierra
      '7': Secuencia de fase de cableado de red anormal
      '8': Fallo PEN
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Alarma 1
  ACChargerAlarm2:
    alarm:
      '0': Fallo del circuito de detección de corriente de fuga
      '1': Relé bloqueado
      '2': Fallo del circuito piloto
      '3': Fallo del módulo de alimentación auxiliar
      '4': Fallo de bloqueo eléctrico
      '5': Fallo de comunicación del panel de lámpara
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Alarma 2
  ACChargerAlarm3:
    alarm:
      '0': Temperatura interna demasiado alta
      '1': Fallo del cable de carga
      '2': Fallo de comunicación del medidor
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Alarma 3
  ACChargerAlarms:
    attributes:
      source: Registros Modbus 32012-32014
      source_range: Registros Modbus {start}-{end}
    name: Alarmas
  ACChargerChargingPower:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Potencia de Carga
  ACChargerInputBreaker:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Interruptor de Entrada
  ACChargerOutputCurrent:
    attributes:
      comment: "Rango: [6, menor entre 'Corriente Nominal del Cargador CA' y 'Corriente Nominal del Interruptor de Entrada del Cargador CA']"
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Corriente de Salida
  ACChargerRatedCurrent:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Corriente Nominal
  ACChargerRatedPower:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Potencia Nominal
  ACChargerRatedVoltage:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Voltaje Nominal
  ACChargerRunningState:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Estado de Funcionamiento
    options:
      "0": Inicializando
      "1": VE no conectado
      "2": Cargador y VE no listos
      "3": Cargador listo; VE no listo
      "4": Cargador no listo; VE listo
      "5": Cargando
      "6": Fallo
      "7": Error # verify:ignore
  ACChargerStatus:
    attributes:
      comment: 0:Iniciar 1:Detener
    name: Iniciar/Detener Cargador CA
    name_off: Detener
    name_on: Iniciar
  ACChargerTotalEnergyConsumed:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Energía Total Consumida
  AccumulatedChargeEnergy:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Energía de Carga Total
  AccumulatedDischargeEnergy:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Energía de Descarga Total
  ActivePower:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Potencia Activa
  ActivePowerFixedAdjustmentTargetValue:
    attributes:
      comment: El EMS remoto debe estar habilitado y el EMS debe estar en modo de control remoto PCS para que este registro surta efecto.
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Valor Objetivo de Ajuste Fijo de Potencia Activa
  ActivePowerPercentageAdjustmentTargetValue:
    attributes:
      comment: "Rango: [-100,00,100,00]. El EMS remoto debe estar habilitado y el EMS debe estar en modo de control remoto PCS para que este registro surta efecto."
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Valor Objetivo de Ajuste Porcentual de Potencia Activa
  ActivePowerRegulationGradient:
    attributes:
      comment: "Rango: [0, 5000]. Porcentaje de potencia nominal ajustado por segundo"
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Gradiente de Regulación de Potencia Activa
  Alarm1Sensor:
    alarm:
      '0': Discrepancia de versión de software
      '1': Baja resistencia de aislamiento
      '2': Sobre-temperatura
      '3': Fallo de equipo
      '4': Fallo de conexión a tierra del sistema
      '5': Sobretensión de cadena PV
      '6': Cadena PV conectada inversamente
      '7': Retroceso de cadena PV
      '8': Fallo AFCI
      '9': Corte de energía de red
      '10': Sobretensión de red
      '11': Subtensión de red
      '12': Sobrefrecuencia de red
      '13': Subfrecuencia de red
      '14': Desequilibrio de tensión de red
      '15': Componente DC de corriente de salida fuera de límite
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: piezas
  Alarm2Sensor:
    alarm:
      '0': Corriente de fuga fuera de límite
      '1': Comunicación anormal
      '2': Protección interna del sistema
      '3': Fallo del circuito de autocomprobación AFCI
      '4': Protección fuera de red
      '5': Protección de operación manual
      '7': Secuencia de fase anormal
      '8': Cortocircuito a PE
      '9': Fallo de arranque suave
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: piezas
  Alarm3Sensor:
    alarm:
      '0': Discrepancia de versión de software
      '1': Baja resistencia de aislamiento a tierra
      '2': Temperatura demasiado alta
      '3': Fallo de equipo
      '4': Sub-temperatura
      '5': Protección interna
      '6': Fuga térmica
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: ESS  # verify:ignore
  Alarm4Sensor:
    alarm:
      '0': Discrepancia de versión de software
      '1': Temperatura demasiado alta
      '2': Fallo de equipo
      '3': Corriente de fuga excesiva en salida fuera de red
      '4': Fallo de conexión a tierra de línea N
      '5': Secuencia de fase de cableado de red anormal
      '6': Secuencia de fase de cableado del inversor anormal
      '7': Pérdida de fase de red
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: G.W.
  Alarm5Sensor:
    alarm:
      '0': Discrepancia de versión de software
      '1': Baja resistencia de aislamiento a tierra
      '2': Sobre-temperatura
      '3': Fallo de equipo
      '4': Fallo de carga
      '5': Protección de equipo
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: EVCD
  Alarm6:
    alarm:
      '0': Comunicación de Gateway anormal
      '1': Comunicación del medidor anormal
      '2': Comunicación del sensor de potencia AC anormal
      '6': Protección dura contra exceso de límite de alimentación a red
      '8': Fallo de arranque del generador
      '10': Fallo CLS
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Alarma 6
  Alarm7:
    alarm:
      '0': Fallo OVGR
      '1': Fallo RPR
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Alarma 7
  AlarmCombinedSensor:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    name: Inversor híbrido
  AlarmSensor:
    attributes:
      source: Registro Modbus {address}
      source_range: Registros Modbus {start}-{end}
    no_alarm: Sin Alarma
    unknown_alarm: Desconocido (bit{bit}∈{value})
  AvailableBatteryChargeEnergy:
