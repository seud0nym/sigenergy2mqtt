cli:
  SIGENERGY2MQTT_CONFIG:
    help: 'La ruta al archivo de configuración YAML (predeterminado: variable de entorno SIGENERGY2MQTT_CONFIG, de lo contrario /etc/sigenergy2mqtt.yaml)'
  SIGENERGY2MQTT_CONSUMPTION:
    help: "Establecer el método de cálculo del sensor de Potencia Consumida de la Planta. Valores válidos son: 'calculated', 'total' (registro de Potencia de Carga Total), o 'general' (registro de Potencia de Carga General V2.8). El predeterminado es 'calculated'. Esta opción se ignora en firmware anterior al que soporta el Protocolo Modbus V2.8."
  SIGENERGY2MQTT_DEBUG_SENSOR:
    help: Especificar un sensor para depurar usando el ID de entidad completo o parcial o el nombre de clase del sensor (ej. especificar 'daily' coincidiría con todos los sensores con 'daily' en su nombre), o una expresión regular para coincidir con el ID de entidad o nombre de clase (ej. '^PowerFactor$' solo coincide con ese nombre de clase). Si se especifica, --log-level también se fuerza a DEBUG.
  SIGENERGY2MQTT_HASS_DEVICE_NAME_PREFIX:
    help: "El prefijo para nombres de entidad de Home Assistant. Ejemplo: Un prefijo 'prefix' antepondrá 'prefix ' a los nombres (predeterminado: '')"
  SIGENERGY2MQTT_HASS_DISCOVERY_PREFIX:
    help: 'El prefijo del tema MQTT Discovery de Home Assistant (predeterminado: homeassistant)'
  SIGENERGY2MQTT_HASS_EDIT_PCT_BOX:
    help: Al editar sensores de porcentaje, usar una casilla de entrada numérica (true) o usar un control deslizante (false).
  SIGENERGY2MQTT_HASS_ENABLED:
    help: Habilitar auto-descubrimiento en Home Assistant.
  SIGENERGY2MQTT_HASS_ENTITY_ID_PREFIX:
    help: "El prefijo para IDs de entidad de Home Assistant. Ejemplo: Un prefijo 'prefix' antepondrá 'prefix_' a los IDs de entidad (predeterminado: sigen)"
  SIGENERGY2MQTT_HASS_SIGENERGY_LOCAL_MODBUS_NAMING:
    help: Usar las asignaciones de entity_id, ganancia y unidad de Sigenergy-Local-Modbus para sensores compatibles.
  SIGENERGY2MQTT_HASS_UNIQUE_ID_PREFIX:
    help: "El prefijo para IDs únicos de Home Assistant. Ejemplo: Un prefijo 'prefix' antepondrá 'prefix_' a los IDs únicos (predeterminado: sigen). Una vez establecido, NUNCA debe cambiarse, ya que romperá las entidades existentes en Home Assistant."
  SIGENERGY2MQTT_HASS_USE_SIMPLIFIED_TOPICS:
    help: Habilitar la estructura de temas simplificada (sigenergy2mqtt/object_id/state) en lugar de la estructura completa de Home Assistant (homeassistant/platform/device_id/object_id/state)
  SIGENERGY2MQTT_INFLUX_BATCH_SIZE:
    help: 'Tamaño del lote de InfluxDB (por defecto: 100)'
  SIGENERGY2MQTT_INFLUX_BUCKET:
    help: Nombre del bucket de InfluxDB v2 (por defecto es --influxdb-database si no se establece)
  SIGENERGY2MQTT_INFLUX_DATABASE:
    help: 'Base de datos InfluxDB para escribir métricas (por defecto: sigenergy)'
  SIGENERGY2MQTT_INFLUX_DEFAULT_MEASUREMENT:
    help: 'El nombre de medición predeterminado para usar en actualizaciones de InfluxDB si un sensor no tiene una Unidad de Medición definida (predeterminado: state)'
  SIGENERGY2MQTT_INFLUX_ENABLED:
    help: Habilitar el envío de métricas a InfluxDB.
  SIGENERGY2MQTT_INFLUX_EXCLUDE:
    help: Lista de identificadores de sensores a excluir (separados por espacios)
  SIGENERGY2MQTT_INFLUX_FLUSH_INTERVAL:
    help: 'Intervalo de vaciado de InfluxDB en segundos (por defecto: 1.0)'
  SIGENERGY2MQTT_INFLUX_HOST:
    help: 'Nombre de host o dirección IP de InfluxDB (por defecto: 127.0.0.1)'
  SIGENERGY2MQTT_INFLUX_INCLUDE:
    help: Lista de identificadores de sensores a incluir (separados por espacios)
  SIGENERGY2MQTT_INFLUX_LOAD_HASS_HISTORY:
    help: Especifique para cargar datos históricos de la base de datos InfluxDB de Home Assistant. Esto solo funcionará si sigenergy2mqtt está configurado para usar el mismo servidor InfluxDB que Home Assistant con las mismas credenciales.
  SIGENERGY2MQTT_INFLUX_LOG_LEVEL:
    help: 'Nivel de registro del subsistema InfluxDB. Los valores válidos son: DEBUG, INFO, WARNING, ERROR o CRITICAL. El valor predeterminado es WARNING (advertencias, errores y fallos críticos)'
  SIGENERGY2MQTT_INFLUX_MAX_RETRIES:
    help: 'Reintentos máximos de InfluxDB (por defecto: 3)'
  SIGENERGY2MQTT_INFLUX_MAX_SYNC_WORKERS:
    help: 'InfluxDB trabajadores máximos de sincronización (por defecto: 4)'
  SIGENERGY2MQTT_INFLUX_ORG:
    help: Nombre o ID de la organización de InfluxDB
  SIGENERGY2MQTT_INFLUX_PASSWORD:
    help: Contraseña de InfluxDB
  SIGENERGY2MQTT_INFLUX_POOL_CONNECTIONS:
    help: 'Tamaño del grupo de conexiones de InfluxDB (por defecto: 100)'
  SIGENERGY2MQTT_INFLUX_POOL_MAXSIZE:
    help: 'Tamaño máximo del grupo de conexiones de InfluxDB (por defecto: 100)'
  SIGENERGY2MQTT_INFLUX_PORT:
    help: 'Puerto de InfluxDB (por defecto: 8086)'
  SIGENERGY2MQTT_INFLUX_QUERY_INTERVAL:
    help: 'Intervalo de consulta de InfluxDB en segundos (por defecto: 0.5)'
  SIGENERGY2MQTT_INFLUX_READ_TIMEOUT:
    help: 'Tiempo de espera de lectura de InfluxDB en segundos (por defecto: 120.0)'
  SIGENERGY2MQTT_INFLUX_SYNC_CHUNK_SIZE:
    help: 'Tamaño del fragmento de sincronización de InfluxDB (por defecto: 1000)'
  SIGENERGY2MQTT_INFLUX_TOKEN:
    help: Token de autenticación de InfluxDB v2 (prefiere las API v2 cuando se suministra)
  SIGENERGY2MQTT_INFLUX_USERNAME:
    help: Nombre de usuario de InfluxDB
  SIGENERGY2MQTT_INFLUX_WRITE_TIMEOUT:
    help: 'Tiempo de espera de escritura de InfluxDB en segundos (por defecto: 30.0)'
  SIGENERGY2MQTT_LANGUAGE:
    help: 'Establece el idioma a utilizar para las traducciones. El valor predeterminado se determina a partir del sistema (por ejemplo, la variable de entorno LANG) o Inglés si no se encuentra ninguna alternativa.'
  SIGENERGY2MQTT_LOG_FMT:
    help: 'Establece el formato de registro. El valor predeterminado depende del entorno de ejecución.'
  SIGENERGY2MQTT_LOG_LEVEL:
    help: 'Establecer el nivel de registro. Valores válidos son: DEBUG, INFO, WARNING, ERROR o CRITICAL. El predeterminado es WARNING (advertencias, errores y fallos críticos)'
  SIGENERGY2MQTT_MODBUS_ACCHARGER_DEVICE_ID:
    help: El ID de dispositivo Modbus del Cargador CA Sigenergy. Se pueden especificar múltiples IDs separados por comas.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY:
    help: Intentar auto-descubrir hosts Modbus Sigenergy e IDs de dispositivo. Si se especifica 'once', el auto-descubrimiento solo ocurrirá si no se encuentran resultados previos. Si es 'force', sobrescribirá los hosts Modbus e IDs previamente descubiertos. Si no se especifica, el auto-descubrimiento está deshabilitado.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_EXCLUDE:
    help: Una lista separada por comas de nombres de clases de dispositivos que se excluirán del descubrimiento automático. El valor predeterminado es 'PID,PSS'.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_MAX_DEVICE_ID:
    help: El ID de dispositivo máximo que se utilizará al realizar el descubrimiento automático de dispositivos Sigenergy en la red. El valor predeterminado es 10 y debe estar entre 1 y 246 (inclusive).
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_NETWORKS:
    help: Una lista separada por comas de redes IPv4 en notación CIDR para escanear durante el descubrimiento automático (por ejemplo, '192.168.1.0/24,10.0.0.0/24'). Utilice esto para escanear redes que son accesibles a través de enrutamiento pero que no están conectadas directamente a una interfaz de red.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_PING_TIMEOUT:
    help: El tiempo de espera de ping en segundos para el auto-descubrimiento de dispositivos Sigenergy en la red. El predeterminado es 0,5 segundos.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_RETRIES:
    help: El número máximo de reintentos Modbus para el auto-descubrimiento de dispositivos Sigenergy en la red. El predeterminado es 0.
  SIGENERGY2MQTT_MODBUS_AUTO_DISCOVERY_TIMEOUT:
    help: El tiempo de espera Modbus en segundos para el auto-descubrimiento de dispositivos Sigenergy en la red. El predeterminado es 0,25 segundos.
  SIGENERGY2MQTT_MODBUS_DCCHARGER_DEVICE_ID:
    help: El ID de dispositivo Modbus del Cargador CC Sigenergy. Se pueden especificar múltiples IDs separados por comas.
  SIGENERGY2MQTT_MODBUS_DISABLE_CHUNKING:
    help: Deshabilitar fragmentación Modbus al leer registros y leer cada registro individualmente.
  SIGENERGY2MQTT_MODBUS_HOST:
    help: El nombre de host o dirección IP del dispositivo Sigenergy
  SIGENERGY2MQTT_MODBUS_INVERTER_DEVICE_ID:
    help: El ID de dispositivo Modbus del Inversor Sigenergy. Se pueden especificar múltiples IDs separados por comas.
  SIGENERGY2MQTT_MODBUS_LOG_LEVEL:
    help: 'Establecer el nivel de registro de pymodbus. Valores válidos son: DEBUG, INFO, WARNING, ERROR o CRITICAL. El predeterminado es WARNING (advertencias, errores y fallos críticos)'
  SIGENERGY2MQTT_MODBUS_LOG_SKIPPED:
    help: Registrar solicitudes Modbus omitidas.
  SIGENERGY2MQTT_MODBUS_NO_REMOTE_EMS:
    help: No publicar sensores de lectura-escritura para integración de Sistema de Gestión de Energía (EMS) remoto a MQTT. Se ignora si se especifica --modbus-read-only.
  SIGENERGY2MQTT_MODBUS_PID_DEVICE_ID:
    help: El ID del dispositivo Modbus PID de Sigenergy. Se pueden especificar varios IDS de dispositivo, separados por comas.
  SIGENERGY2MQTT_MODBUS_PORT:
    help: 'El número de puerto Modbus del dispositivo Sigenergy (predeterminado: 502)'
  SIGENERGY2MQTT_MODBUS_PSS_DEVICE_ID:
    help: El ID del dispositivo Modbus PSS de Sigenergy. Se pueden especificar varios IDS de dispositivo, separados por comas.
  SIGENERGY2MQTT_MODBUS_READ_ONLY:
    help: Solo publicar sensores de solo lectura a MQTT. Ni sensores de lectura-escritura ni de solo escritura se publicarán si se especifica.
  SIGENERGY2MQTT_MODBUS_RETRIES:
    help: El número máximo de reintentos para una operación Modbus si falla. El predeterminado es 3.
  SIGENERGY2MQTT_MODBUS_TIMEOUT:
    help: El tiempo de espera para conectar y recibir datos Modbus, en segundos (usar decimales para milisegundos). El predeterminado es 1,0.
  SIGENERGY2MQTT_MQTT_ANONYMOUS:
    help: Permitir conexión anónima al broker MQTT (sin usuario/contraseña). Si se especifica, las opciones --mqtt-username y --mqtt-password se ignoran.
  SIGENERGY2MQTT_MQTT_BROKER:
    help: 'El nombre de host o dirección IP del broker MQTT (predeterminado: 127.0.0.1)'
  SIGENERGY2MQTT_MQTT_KEEPALIVE:
    help: El período máximo en segundos entre comunicaciones con el broker. Si no se intercambian otros mensajes, esto controla la frecuencia con la que el cliente enviará mensajes ping al broker. El predeterminado es 60 y el mínimo es 1.
  SIGENERGY2MQTT_MQTT_LOG_LEVEL:
    help: 'Establecer el nivel de registro de paho.mqtt. Valores válidos son: DEBUG, INFO, WARNING, ERROR o CRITICAL. El predeterminado es WARNING (advertencias, errores y fallos críticos)'
  SIGENERGY2MQTT_MQTT_PASSWORD:
    help: Una contraseña válida para el usuario del broker MQTT
  SIGENERGY2MQTT_MQTT_PORT:
    help: El puerto del broker MQTT (predeterminado es 1883, a menos que se especifique --mqtt-tls, en cuyo caso el predeterminado es 8883)
  SIGENERGY2MQTT_MQTT_TLS:
    help: Habilitar comunicación segura al broker MQTT sobre TLS/SSL. Si se especifica, el puerto MQTT predeterminado es 8883.
  SIGENERGY2MQTT_MQTT_TLS_INSECURE:
    help: Habilitar comunicación insegura sobre TLS. Si su broker usa un certificado autofirmado, debe especificar esta opción. Se ignora a menos que también se especifique --mqtt-tls.
  SIGENERGY2MQTT_MQTT_TRANSPORT:
    help: Establecer el mecanismo de transporte MQTT. Debe ser websockets o tcp. El predeterminado es tcp.
  SIGENERGY2MQTT_MQTT_USERNAME:
    help: Un nombre de usuario válido para el broker MQTT
  SIGENERGY2MQTT_NO_EMS_MODE_CHECK:
    help: Desactivar la validación que deshabilita los límites de Carga/Descarga Máx ESS y Potencia Máx PV cuando el Modo de Control EMS Remoto no es Carga/Descarga por Comando.
  SIGENERGY2MQTT_NO_METRICS:
    help: No publicar métricas de sigenergy2mqtt.
  SIGENERGY2MQTT_PERSISTENCE_CACHE_WARMUP_TIMEOUT:
    help: 'Segundos máximos para esperar el estado retenido de MQTT durante el precalentamiento del caché de inicio (predeterminado: 10.0, rango: 1-60)'
  SIGENERGY2MQTT_PERSISTENCE_DEBUG:
    help: Habilite el registro de depuración para todas las operaciones de almacenamiento de estado (persistencia).
  SIGENERGY2MQTT_PERSISTENCE_MQTT_REDUNDANCY:
    help: 'Deshabilitar la redundancia de mensajes retenidos de MQTT para la persistencia de estado. Cuando se establece, el estado solo se persiste en disco.'
  SIGENERGY2MQTT_PERSISTENCE_MQTT_STATE_PREFIX:
    help: 'Prefijo de tema MQTT para mensajes de estado persistidos (predeterminado: sigenergy2mqtt/_state)'
  SIGENERGY2MQTT_PERSISTENCE_SYNC_TIMEOUT:
    help: 'Tiempo de espera en segundos para operaciones de persistencia síncronas cuando se llaman desde un hilo no asyncio (predeterminado: 5.0, rango: 0.1-30.0)'
  SIGENERGY2MQTT_PVOUTPUT_API_KEY:
    help: La clave API para PVOutput
  SIGENERGY2MQTT_PVOUTPUT_CONSUMPTION:
    help: Habilitar envío de datos de consumo a PVOutput. Puede especificarse sin valor (en cuyo caso usa 'consumption') o como 'net-of-battery', 'consumption', o 'imported'. Si no se especifica, no se envían datos de consumo.
  SIGENERGY2MQTT_PVOUTPUT_ENABLED:
    help: Habilitar actualizaciones de estado a PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXPORTS:
    help: Habilitar envío de datos de exportación a PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_EXT_V10:
    help: "Una fuente para completar el campo extendido v10 en PVOutput. Puede especificar un nombre de clase de sensor, un id de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>) o un id de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>, solo app). Si no se especifica O su estado de donación no está vigente, este campo no se enviará a PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V11:
    help: "Una fuente para completar el campo extendido v11 en PVOutput. Puede especificar un nombre de clase de sensor, un id de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>) o un id de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>, solo app). Si no se especifica O su estado de donación no está vigente, este campo no se enviará a PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V12:
    help: "Una fuente para completar el campo extendido v12 en PVOutput. Puede especificar un nombre de clase de sensor, un id de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>) o un id de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>, solo app). Si no se especifica O su estado de donación no está vigente, este campo no se enviará a PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V7:
    help: "Una fuente para completar el campo extendido v7 en PVOutput. Puede especificar un nombre de clase de sensor, un id de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>) o un id de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>, solo app). Si no se especifica O su estado de donación no está vigente, este campo no se enviará a PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V8:
    help: "Una fuente para completar el campo extendido v8 en PVOutput. Puede especificar un nombre de clase de sensor, un id de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>) o un id de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>, solo app). Si no se especifica O su estado de donación no está vigente, este campo no se enviará a PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_EXT_V9:
    help: "Una fuente para completar el campo extendido v9 en PVOutput. Puede especificar un nombre de clase de sensor, un id de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>) o un id de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>, solo app). Si no se especifica O su estado de donación no está vigente, este campo no se enviará a PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_IMPORTS:
    help: Habilitar envío de datos de importación a PVOutput.
  SIGENERGY2MQTT_PVOUTPUT_LOG_LEVEL:
    help: 'Establecer el nivel de registro de PVOutput. Valores válidos son: DEBUG, INFO, WARNING, ERROR o CRITICAL. El predeterminado es WARNING (advertencias, errores y fallos críticos)'
  SIGENERGY2MQTT_PVOUTPUT_OUTPUT_HOUR:
    help: La hora del día (20-23) a la que se envían los totales diarios a PVOutput. El predeterminado es 23 (11pm). Valores válidos son 20 a 23. El minuto se elige aleatoriamente entre 56 y 59. Si especifica -1, las cargas diarias se enviarán con la misma frecuencia que las actualizaciones de estado.
  SIGENERGY2MQTT_PVOUTPUT_SYSTEM_ID:
    help: El ID del Sistema PVOutput
  SIGENERGY2MQTT_PVOUTPUT_TEMP_TOPIC:
    help: "Una fuente para la temperatura actual enviada a PVOutput. Puede especificar un tema MQTT directo (o mqtt:<topic>) o un id de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>, solo app). Si no se especifica, la temperatura no se enviará a PVOutput."
  SIGENERGY2MQTT_PVOUTPUT_UPLOAD_LOG_LEVEL:
    help: 'Establezca el nivel de registro para los mensajes de registro de carga de PVOutput. Los valores válidos son: DEBUG, INFO, WARNING, ERROR o CRÍTICO. El valor predeterminado es INFO'
  SIGENERGY2MQTT_PVOUTPUT_VOLTAGE:
    help: "La fuente del valor de voltaje a enviar a PVOutput. Valores válidos son: phase-a, phase-b, phase-c, l/n-avg (promedio línea a neutro), l/l-avg (promedio línea a línea) o pv (promedio de cadenas PV). El predeterminado es 'l/n-avg'."
  SIGENERGY2MQTT_REPEATED_STATE_PUBLISH_INTERVAL:
    help: "El intervalo en segundos en el que se publican los estados repetidos. Si < 0, los estados repetidos nunca se publican. Si 0, los estados repetidos siempre se publican. Si > 0, los estados repetidos se publican en el intervalo especificado. El valor predeterminado es 0 (publicar siempre)."
  SIGENERGY2MQTT_SANITY_CHECK_DEFAULT_KW:
    help: El valor predeterminado en kW usado para comprobaciones de cordura para validar los valores máximo y mínimo de sensores de potencia y el valor delta de sensores de energía. El valor predeterminado es 500 kW por segundo, y las lecturas fuera del rango se ignoran.
  SIGENERGY2MQTT_SCAN_INTERVAL_HIGH:
    help: El intervalo de escaneo en segundos para registros Modbus que se escanean a alta frecuencia. El predeterminado es 10 (segundos), y el valor mínimo es 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_LOW:
    help: El intervalo de escaneo en segundos para registros Modbus que se escanean a baja frecuencia. El predeterminado es 600 (segundos), y el valor mínimo es 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_MEDIUM:
    help: El intervalo de escaneo en segundos para registros Modbus que se escanean a frecuencia media. El predeterminado es 60 (segundos), y el valor mínimo es 1.
  SIGENERGY2MQTT_SCAN_INTERVAL_REALTIME:
    help: El intervalo de escaneo en segundos para registros Modbus que se escanean en tiempo casi real. El predeterminado es 5 (segundos), y el valor mínimo es 1.
  clean:
    help: Publicar descubrimiento vacío para eliminar dispositivos existentes, luego sale inmediatamente.
  discovery_only:
    help: Salir inmediatamente después de publicar el descubrimiento. No lee valores de la interfaz Modbus, excepto para sondear la configuración del dispositivo.
  show_version:
    help: Muestra el número de versión, luego sale inmediatamente.
  validate_only:
    help: 'Valida la configuración y prueba la conexión/autenticación configuradas; luego sale inmediatamente. Modo opcional: --validate=show_credentials registra las credenciales reales utilizadas para las pruebas de conexión.'
